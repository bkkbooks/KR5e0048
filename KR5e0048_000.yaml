沒非灾橫禍又我愛西巖秀麗仙園地發三陽山形曲屈卧龍岡只此人間天上雲舍茅庵掩映仙花異果馨香巿朝客到見清凉舉手應須瞻仰又我愛秋陽天氣一指雲路無迷何勞身外覓曹溪了見三身四智莫問天機深遠休尋大道無為目前認得這些兒便是全真苗裔龍陽觀冬至作月魄光通四海龍陽氣滿三田一聲雷動振山川迸出飛光閃電法雨常加有道慈雲廣布無邊此時方顯太平年遂我一生本願又天上仙無懵懂人間性有頑愚門中有幸看經書法性堂堂開悟達理真明妙有觀空體合虛無慧通靈寶證元初誰解無文不度又進道須憑篤志收心慎勿狂遊聽豫苦口勸同流莫待因循皓首緑髮朱顔易改青春白晝難留爭如速悟便回頭認取忠言善誘又山後重興道院燕南仍自干戈道人功行纍來多免却非灾橫禍每日誦經報國終朝念道降魔福生禍滅養沖和真靜真清證果時在天長正當大暑歸山後恰值三秋因事而作九夏天長暑熱三秋山後清凉一川禾黍正蒼蒼了見西成有望論甚天涯海角儘他關外山荒目前無事即仙鄉且恁隨緣豁暢又莫羡喧譁京巿休辭淡薄山家猿啼鶴唳興還加心地清凉無價夜伴清風皓月曉觀緑檜雲霞蓬頭丫髻做生涯堪向幽幄圖畫又窗外橫山入畫門前流水堪聽洞天幽處少人行不是塵寰路徑占得靜中風月却回鬧裏人情湛然六識自安寧一任間歌間詠又月裏金烏報曉日中玉兔方眠誰知萬法倒顛顛此理非深非淺認得元初這箇須明無事真禪人人有分性周圓只為使他不轉又淺見有知有識深通無悟無迷了然頓覺入夷希此是男兒正智達道豈離方寸明心何在天西終朝間坐細尋思裂轉機關便是又有欲難超老病無情易變童顔虛心實腹六神安步步清凉彼岸九載能除四相十年决到三山蓬壺閬苑恣遊間免却人間流轉贈田道人動處休將性動靜中莫使心疑目前端正沒關機真靜真清便是氣滿三田自實神通八脉方知了然頓覺入無為到處安心穩地贈萬蓮會衆事事諳來心足般般捨去身輕本初一點要圓成妙語玄言堪聽縱意不知有我收心自覺無明無明滅盡絶塵情便是識心見性入西山路石徑雲梯路險攀蘿攬葛難行洞天深處水山明遠却塵寰視聽土洞安眠穩坐松巖耳靜心清不須更羡許由名便是超凡入聖又非愛青山緑水惟圖隱跡埋名粗衣糲食絶人情養就元初本柄氣結神凝久視虛心實腹長生一朝功滿現三清此是男兒正性勸衆减睡夏日勤修寶殿冬天好鍊頑心三更不縱睡魔侵便是先生戒禁學道休迷妄想修真莫失叢林無為功滿恣歌吟自在高眠穩枕常足暢懷盡日觀山玩水終朝常足心休老來佚樂更何求保我陽生九九幸得為人通道道中别有歸投功成雲步看瀛洲萬古名傳不朽贈張先生日用竈頭然火時教突裏亡煙始終如一志精專也勝往來打轉放下紛紛塵事明通朗朗玄言一朝功到性靈圓便是蓬萊中選寄京師道友只為功虧行闕故教不免東西自從别後二年期路轉風塵萬里詞寄燕山道衆聽豫至囑休疑外緣雖幹內忘機免却前頭懊悔又人事雖然久厭道家爭忍空歸不因勤苦到關西焉得重陽慶會說與門中志士祖庭已見根基終南山色古今奇老者堪為久計贈儒士王子正本性元虛不二奈何情欲交加人能頓悟道生涯世態分明是假更要深通玄奧須當拂去矜誇含光默默養靈芽便是無為造化巫山一段雲秋陽觀作十九遊仙子隨師歷八荒西臨回紇大城隍到處見農桑一種靈瓜甚美赤縣幾人知味大千沙界有多般鶴駕復東還又塞北三年轉天西萬里回飄飄雲駕漸東來無不笑顔開道德峥嶸功大行滿决超三界十方仙子行功圓得見太平年又太上臨關日吾宗受道時七雄戈戟鬭相持何處起慈悲直至西天行化大教普聞天下古今今古類皆同方顯道家風又北海修真士西巖放曠人别師迢遞過關津物外不沾塵學道須憑决烈一片真心如鐵九年功滿步雲霞三島是吾家又性燭通天眼心燈放慧光湛然靈物自真常無處不圓方住世榮華不戀舉措常行方便一朝功滿化雲歸獨步赴瑶池寄天長道衆山後春將暮龍陽景漸佳東園芭欖正開花隨分有生涯道友堅心長久相見時時稽首自然恬淡日和平物外有餘清携杖上禪房山自在三山客逍遙四海賓孤身到處自全真風月永為鄰識破浮華虛假誰羡望雲星馬一條柱杖勝龍驂穩步上高岑先天觀作涿鹿今朝到蚩尤往日休坂泉冬夏水長流今古幾春秋因此强兵戰勝直到而今無定一生一殺做冤讎早晚是程頭道友堅留住冬聖地西北有缺可費千功未暇修補待春暖可以完備因緣故述之我有林泉興君無補缺心一方聖境理幽深物外結知音還到春時圓備合是全真一會功成行滿待他年携手上雲天龍陽觀九日白酒寬懷抱黃花噴鼻香此般真味慶重陽性月自圓方山後三秋無别幽檻幾叢開徹兩軒各各鬥芳鮮雅勝洞中天勸世道顯清虛妙釋明智慧深仲尼仁義古通今三聖一般心不認忘名默悟只解分門别户一朝合眼見前程悔恨不圓成卜居西關好山萬疊河在其中曲回上下不啻二三十里渾水波濤兩岸桑麻映日人善地僻可為終焉之計自號日養老庵以小詞寄之耳萬疊山橫翠千盤河曲長居民安土樂農桑流水落花香卜此安居養老一任形枯心槁不搖不動寄殘年何處覓神仙題通仙觀列翠峰巒秀仙都氣象清三陽端正玉鼇形一氣自天成萬疊雲山深處别是洞天幽圃何人能得久間居清靜樂無餘催衲襖昨夜西風緊今朝秋意深道人雖則是降心寒暑亦難禁衲襖宜教寬大且要晝披夜蓋一衣猶恐不銷任此外更何尋龍門川溪水同翟老賞月溪水迎霜冷山花帶露鮮良朋共賞玉瞻圓高會興無邊長記西湖萬里素魄澄澄一體今宵相隔正三