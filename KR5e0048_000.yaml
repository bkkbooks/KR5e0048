友行遍天涯海角未似西山心樂興盡復東還鬢多斑彼此年過耳順别後有何憑準唯願各心休永無憂又三老共全清福終日遊山不足坐卧白雲中看青峰飯罷東坡石上談笑開懷豁暢妙景可忘憂對清流別蔚州道衆十月蔚羅行化去送來迎車馬和氣滿山川教風傳别後何時再遇唯願各心開悟功積要三千化靈仙又九九嚴凝冰結山後朔風凜冽西去意如何囉㖫囉道友一聲珍重慎勿使他心動志氣要平和道無魔又隨處道人道友勿使人清濃厚凡百在平常少灾殃别後應當西邁接待往來寧耐他日要相參望終南懷仁縣作我愛懷仁冬月炕暖窗明堪歇天意不教間過南山東去西來非願海角天涯將遍道果尚難成又登程老年退居沁郡奉詔還燕京大長春宫十月小春時令萬物歸根安靜獨我水雲間過東山直指古燕無定老也敢違天命回首望終南再來參依韻别沁州長官杜帥未達難通天令誰解動中生靜道在有無間隔千山去住絶疑心定任運逍遙隨命終日不迷南更何參減字木蘭花秋陽觀作勸世堆金積玉日日慳貪心未足足上何求直待荒郊卧土丘回頭有路爭奈愚人迷不悟若悟回頭免了前程無限愁又勞生喪命誰解衣餐皆分定恣欲貪癡積業如山猶不知一朝有報鐵膽銅心人也懊受罪無休恨不當時聞早修又頑愚不息禍福還如身逐影劫運天灾都是人人心上來若明此理視物應當同自己了見天真善惡臨時全在人又損人利己貪愛欺瞞何日己害衆成家富貴人前仍自誇陰公暗記死上頭來誰肯替天道無私報應分明各有時又天堂豈遠舉世迷人尋不見地獄非親無限衆生塞斷門聰明上士幸得為人勤發志志在心平片善無遺道自成縉山川有三觀皆有陽字此間往來故云三陽道士三陽道士坐對雲峰談不二萬法如通盡在忘機冷笑中無明實性此理難詮如何證要證元初認取高空秋月孤秋陽道友見過金波玉液除却媯川無處覓玉液金波一飲能教五氣和還丹大藥服了令人常快樂大藥還丹福薄衆生要見難一道士出示杜甫遊春詩卷遊春暢飲萬物熙熙花似錦暢飲遊春迷了從來多少人儒流道士幾箇能通天外志道士儒流誰肯忘情言下休示衆年深學道雖未通靈神氣好學道年深萬景叢中無物侵同流聽勸薄利虛名深可遠聽勸同流放下諸緣宜速修又身心裂轉便是元初真目面裂轉身心一志如山超古今些兒若悟免却波波來與去若悟些兒萬劫希逢此一時又同塵混世誰解忘言無酒醉混世同塵落魄逍遙甘分貧靈源不昧勝積無涯真寶貝不昧靈源一氣清成要上天贈龍虎夫人昏昏默默世智聰明孰可測默默昏昏無欲能開衆妙門全真抱朴無慮無思無做作抱朴全真入聖超凡只在人西山作修真近俗初地難當心境熟近俗修真誰是居塵不染塵林泉恣興便是修真無可證恣興林泉且作逍遙陸地仙又安禪聚落難免區區間把捉聚落安禪佛祖常憂恐落緣山林縱卧無慮無思真快活縱卧山林一點靈光無物侵贈燕京萬蓮會衆回頭返照世事無窮堪失笑返照回頭得意歸來便好休休休省也莫縱貪癡狂野馬省也休休一任年光春復秋懷仁縣懷仁抱義五帝三皇因此治抱義懷仁天下生靈一體親勤參道德建國成家為法則道德勤參更與修身作指南西路請張道人於處順堂畫西遊記清河畫士處順存心堪發志畫士清河早早來時意若何全真宗祖畫向白雲傳萬古宗祖全真永鎮燕山日日新悟南柯勸世著假求仙果迷真覓佛心香禮拜恐徒尋不斷無明空惹業根深苦口如良藥忠言似美金人逢善者作知音正教依憑萬禍不能侵又生日無明重死時地獄深寸陰可惜勝黃金速悟無生上士做知音轉眼迷他趣回頭認本心功成自是出陽陰物外真間坦蕩賦清吟又莫要欺人重須妨報應深羣真降世布清吟勸化愚迷灾禍免相侵更悟真常性勸修吉善心長生路上聽仙音正道無疑穩步赴瑶岑又莫覓他人短唯思自己長處身謙讓性和光與物無私心地得清凉會滅無明火能生智慧香何勞遠去覓天堂任運安間處處是仙鄉青玉案自遣揚眉瞬目分明露認得元來處清靜無為香滿炷十方通徹遍聞三界一任年將暮些兒妙處堪人顧關外棲真忘來去更有雲霞三四侶清吟野興固窮樂道此外非他取又心頭遠惡常修善自得真方便至道夷然容易見目前端正是非休論堪作長生伴玄言悟徹無分辨默默頤真內光現保養神丹成九轉化身空外六銖天賜换了如今面又浮華莫戀心歸道漸得通玄妙清靜功圓心地了高登彼岸清凉永占更沒間煩惱長春真境仙無老咫尺洞天誰能到心上塵情都一掃琳宫仙院乘風清興遊宴蓬萊島又羣魔散盡真何亂萬事無縈絆一點光同青玉案纖塵不掛永無障礙得見虛空面勸君早把塵情𢬵下手速修轉頭晚前有風波深不淺神舟穩駕雲朋相伴笑指蘆花岸瑞鷓鴣與延真觀小賈師道人起念不尋常宿業牽纏惹禍殃朴實修真方得久浮虛學道豈能長旋生旋滅心難定不動不搖意易防早悟知常功纍足恁時許爾志堅剛詠西山西山深處道人家養道修真何處加九夏高眠無暑氣三秋結實有新瓜亂山坡下宜禾黍渾水河邊長麥麻四季平和人事少三餐終日是生涯過龍泉峪西山一帶好人煙曲水環山若洞天無是無非無寵辱有花有果有林泉家家奉道邀間客户户欽壇禮大仙如此勤心行吉善太平快樂遇豐年示衆論道談禪鬥捷機朦朧合眼便昏迷貪名競利心猶在損己安人行豈知益友不侵賢聖遠良朋難近虎狼隨一朝數滿無由悔聞早收心莫縱欺又為人幸遇教門興折莫因循著世榮節食减眠神自爽忘情去欲氣偏清暫時戒慎離灾苦久遠行持出死生奉勸高眀宜省悟聞身强健早修行勸世長春教法付清和普勸高明出愛河道德勸修天賜樂塵情苦戀世生魔目前放下遊真境身後功深赴大羅我有忠言親說破看君聽了意如何又六年動作小功成固蒂深根漸次榮東院西宫間客坐南來北往道人行十方和氣精神爽四海同心道眼明天運玄風來此地燕山路上好前程南鄉子寶玄堂偶得本性愛疏慵不厭無名不厭窮落魄隨緣無所礙心通觀透人間事事空得失本來同動靜何勞問吉凶兀兀前途真自得成功都在忘言冷笑中贈西路道人幸遇好良因枉惹浮名受苦辛只為目前些豫事因循趖過中間换了身默坐守靈根空外間搜空外真認得亘初微妙物堪親唤作神仙不唤人虞美人勸世邇來似覺精神湧識破人間夢皆因恬淡樂清和與物無私光照遍山河如今普勸修真衆莫待空無用一朝歸去恨身卑悔不當時勤苦做修持月上海棠示衆先師歸去功無量日赴千壇顯聖象化身千百暗中度人來往休輕謗恐灾禍臨頭怎向一時開化通無上廣集門生普供養但持齊戒志心各懷歸仰虛空裏管有神明賜賞踏雲行贈長春宫道衆智慧男兒聰明上士修真幸遇先師指葆光殿閣對青山白雲堪伴長春子樂道眀心勝看經史神仙籍上書名字大家勤苦守靈蹤皇天肯負清高志自詠薄利虛名誰人能戒前頭路險猶貪愛惟豫不敢著浮華中心有願超三界廣布慈風休生懈怠心懷忍辱常寧耐豁開心地若虛空分明見箇真難壞又暗地高真明加保祐白雲仙跡當成就吾門七祖鎮燕山金蓮萬朵芬芳秀衆會寧心道人長久同修清德過星斗他年功滿去朝元先師應賜長生酒又靜裏喧喧鬧中寂寂靈源妙用誰能識兩般顛倒入虛無自然顯箇真消息氣過三關神遊八極綿綿來往無蹤跡此時休歇罷參尋前程路上忘疑惑讚師父仙體不朽玉骨元清金丹已就長春不老何年朽圓成一性遍河沙遣骸全體仍依舊萬代稀逢一時罕有天涯門弟來奔凑安居處順慶真容焚香十萬連三書點絳唇重九後五日作體入虛空猶然未可為憑據真空路氣神相聚現出陽神去若遇知音此事堪分付君聽取莫生疑悮行滿天將護又聞說修行千差萬别難依據真空路何人得趣撒手堪歸去行積無邊功要三千數心開悟逍遙雲步應過天仙舉又學道尋真寧心耐意搜求正刀圭柄羣真相慶一顆明珠瑩照見元初認得頭和影神通聖內容清興物外間吟詠又學道難成無明觸處生烟火招殃禍時光虛過生死如何趓早悟前愆更不生人我還真箇時時明破下手修仙果又燁燁重陽素秋氣爽添清興仙歌詠黃華相稱朵朵如如性小檻芬芳滿座人欽敬真清靜香風純正萬户千門慶暮春遊五華山繼先師韻昨日春遊一行恰似乘鸞鳳知音共適懷心縱直入桃源洞好向清溪間聽琴三弄真歡動任地迎送管甚莊周夢卜算子玉虛觀夜境中師父令和都要奔波走卜算子仍易其名日北地樂真性休空走二物長相守這些消息阿誰知便是無中有寶鼎瓊花放玉户金光透作箇清凉彼岸人清靜工夫就駕聖朝義州醮罷命郭志全講道德二篇古宜緣重善根深種志士心堅感吾門洪教廣開緣共談論功圓中宵不寐雲朋高會參透玄玄向五千文內契忘筌見自己神仙又夜深人靜披衣間坐琴聽無絃罷高談逸論默通玄任龜息綿綿陰陽升降沖和四大骨壯神全抱元初一點行功圓看歌舞胎仙太平興國觀中秋賞月海清山靜素秋光滿凉夜人圓恣開懷賞玩過三更更談論幽玄圓明頓悟無私普照善行周全向今宵覺徹性皆通證陸地神仙一剪梅依先師真人和移刺仲澤韻義州永和庵作九九方終暖日陽春和崇義無夢天長十方三界恣遊行炎夏還逢不覺秋霜悟得真間萬事忘自然佚樂心地清凉本來一點縱寬舒散盡羣魔獨現威光示衆復用前韻外積陰功內固陽長春示衆此語偏長還能頓悟入無為宿業猶如赫日消霜不假澄心六欲忘功成行滿越過炎凉騰騰兀兀任西東覺徹人間且恁韜光太平興國觀示衆天賜平遙好歇心琳宫寂寂古柏森森清陰密鎖洞天幽聚落相鄰靜勝山林清靜無為孰得尋太平興國覓箇知音勸君速悟莫遲疑言下承當賢聖加臨寄蔚州道友越過靈仙壺水傍西河餞送誠厚難忘未能款話便登程度嶺嚴寒來意匆忙幸得和平達道鄉渾源豐足諸事安康有人東去寄新詞報與知音表我行藏詠前高山新得前高一簇山清虛洞府亘古仙壇皇天憐我苦奔馳佚我年高教我開顔暗謝高穹賜我間松間石上斷了追攀欣然自得樂無窮行也堪觀坐也堪觀又新得前高自發揚峰巒峭拔松檜成行道人歸計出紅塵碧洞高眠無事牽腸白髮垂垂兩鬢霜青松影裏描邈難粧往來遊戲日當斜行也清凉坐也清凉又新得前高孰可知世間清絶詩筆難題朝元峰上試間窺未赴蓬萊先到瑶池一派松風入耳吹仙音縹眇洞達幽微興來策杖步雲溪行也相宜坐也相宜述懷贈程老先生學道無成天不慳虛名濫占實得應難從今志氣更重加東望都休不下西山深謝知交欣崞間四時不闕助我衣餐有時慶會上朝元功行雙全日赴千壇述懷贈柳先生一點靈明本寂然隨通隨感應赴諸緣頭頭認得這些兒動也方圓靜也方圓日用無私不著邊清虛消息此法堪傳指人頓悟入無為行也忘言坐也忘言下山為愛前高自覺過天生阻隔不放沖和前頭何處道緣深無福清間有分奔波老也功虧一任魔長春教語慎勿蹉跎自來達道學仙人功也無多行也無多下手遲義州醮罷勸衆諸緣種種怎生休萬慮紛紛何日息情忘處諸緣頓了意滅時萬慮俱畢問君能有幾多時猶向人間弄智識還知恁麼便回光免使臨頭愁戚戚昭君怨泉州洞直觀書于東壁節令重陽間步真至武清南渡極目看嘉祥水茫茫連日陰沉微雨正在蘆花深處遊樂水雲間望西山鳳棲梧觀世大教普聞天下轉返朴全真日用垂方便方便真慈清靜願心通漸覺人情遠上士高明容易勸既悟玄風早早忘知見世事安能長久戀不如認證元初面葆光集下
