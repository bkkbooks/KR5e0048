body:
  text: 清和真人尹志平撰七言絶句金山自宣德州至田相公營約七八千里乃金山之北也西北行程近八千却成南下過金山金山更向西南望才見陰山縹眇間又曾從神仙日下遊五千里外水分頭時人只解東溟注不見長河西北流又西出陰山萬里多一重山外一重河大河五次親曾渡餘外山河未見他過大石林牙契丹國大石是契丹語學士名林牙是小名中原呼大石林牙為國號遼因金破失家鄉西走番戎萬里疆十載經營無定止却來此地務農桑又羣雄戰力得農桑大石林牙號國王幾帝聚兵成百萬到今衰落亦城荒西域物熟節氣比中原較早故記之止渴黃梅已得嘗充飢素椹又持將時當小滿才初夏椹熟梅黃麥亦黃師適有他往而雲水高人踵門者日無一二因作此師去交朋來往稀知心還似不相知胸中有志忘人事與我真情正所宜唯太守家李提控日逐一過此道難行步步高時人見者謾徒勞隴西道友知何意忙裏偷間日一遭自詠世念如今已不生惟思道德未精誠蒙師訓教經千百是處無過苦己行段公覓得小魚放生乞得纖鱗免受烹放歸溪水任遊行莫言他日成鯨去目下從容也暢情寶玄堂作出門開眼見西山只為緣輕未得還身在葆光雖散誕此心常憶白雲間和陳學士西山終日有雲煙只為人心未了然誰肯回頭林下問本來面目是真仙和趙講師休向心田挂一毫囑君四句記來牢衆中不見他人過便許先生道德高劉宣差病索詩欲求輕健得安然試伴長春向寶玄百日消踈如肯受他年骨壯自神全蒙師㫖去山東别燕京偶得一絶西域歸來萬里餘區區尚未得幽居他時若到安間處靜掩柴扉不出廬和王道録物物知空任去來頭頭心上覺花開是非過耳休重問道德終身莫下懷又教風普振遇長春豈擇官寮與士民箇箇携將歸紫府人人點化出紅塵真人有天上人間四絶依韻奉和天上真仙無事忙人間愚昧自相妨不知心是根源主終日空勞禮十方又天上羣仙心本同人間萬法總虛空不知道德渾淪妙猶自談西與說東又天上莊嚴道力成人間法像善經營不知上聖垂方便執性昏昧幾箇明又天上真功達者稀人間立像要歸依若人頓悟無生理便是吾門最上機燕京會首間作福作福須從損己求修真只要肯心休古今賢達無多事福慧雙全第一流自詠自顧微軀劣弱多尋常五臟却安和雖然未達青霄去幸免今生苦戰魔又人羡剛强是俊英我憐柔弱得全生試觀舉世貪名者盡在塵中苦戰爭又受教師真三十年幾回責我不周全暗中速改即成老死上頭來尚未圓寶玄堂下得房二間兩間靜室一間空片席安眠樂在中莫怪忘貧隨分過都緣造道未精通又暖室明窗我則眠返思天下有餘寒三冬誰得優游過多被刀兵歲歲殘又靜室安居明更清等間不惹世間情從他外景魔千遍一片真心不解驚又本來一點最孤靈染著人情萬事生欲要歸根清淨去應須返朴入圓成又用時行道學長春捨則潜心默契真一性既通非內外兩般消息沒疏親又苦思奇句竟何爭無礙狂吟信筆成樂性發言聊暢道興來自得不求名禪子出示墨竹圖索詩收得黃山三兩竿展開付與道人看任他塵世光陰急不識榮枯與歲寒道友索茶爽氣自生常灑落睡魔戰退得清凉有為終是歸生滅無事天然定久長登高白露零時秋意深紛紛紅葉墜寒林黃花亭上三般樂把酒高歌遣興吟自省好靜從來辨正在人先睹事徵求訪妙玄今日始知當日錯忘言忘我性方全又每見恣情招橫禍未聞至道惹非灾古今仙分緣何得都是存心靜處來寶玄堂月下聞鴈燕山空闊夜彌清坐聽征鴻一兩聲豪客營營心有著幽人寂寂耳偏明又寶玄秋後轉加清靜夜沉沉聞鴈聲默坐睡魔難著摸月光心竅兩分明看雞冠花羣紅十日多零落純紫三秋尚耐風莫似間花看一例性根禀受不相同談論各處見解未知實際贈陳學士人間口鼓未能窮出世清談與箇中誰解窗眀猶紙隔外頭裏面兩般風吳學士呈真人詩五篇和之幸為男子長中州好占仙標第一儔學取龐君並許氏全家輕舉免荒丘又一身本分樂幽居免却人間虛過譽性靜自然通正教心間何必苦看書又修真無志望天然推了明年又一年只待陰公傳的信此時何處覓神仙又人無决烈不能間暮去朝來鬢漸斑都道林泉堪養道古今幾箇到家山天長觀作浮名輕染即成魔況復人情事轉多著景因循無决斷前程終久待如何陳學士覓冠簪詩愛與人交心見心等間未肯許冠簪先生骨相非塵俗林下何時肯重尋燕京劉會首出家要住西山上方雲峯觀贈詩二首教在幽燕大闡開度人千萬會中來唯君得味心先覺靜住西山更莫回又入道彭城最有緣專投誓狀叩重玄而今便作雲峰主未到蓬萊已是仙寶玄堂偶得看破身空萬法空寂然不動感而通真常應物渾無礙變化神靈顯聖功又日逐東生西復沉浮雲短景更相侵行年六十老將至但向虛齊寶寸陰捉住無眀莫縱無明業火生無明起處是真情觸來看破無明妙便把無明作我明修行五更頌晚參罷後一更初收拾靈光入太虛耳內不聞塵事亂性中寂寂樂無餘又二更寂寂樂真間一氣綿綿任往還行滿三田陰鬼滅功成九轉列仙班又三更三點一陽生六甲三元五氣清不是性根超造化如何命寶得圓成又四更魔退罷驅兵穩睡安眠賀太平夢裏分明無所著覺來依舊有餘清又五更五點五更殘一志堅剛靜若山休道神仙無處覓長生只在寸心間苦辭真人往縉山大劫紛紛尚未安辭師别衆鐵心肝道人决烈將何喻死到頭來更是難甲申年十一月二十四日辭師會劉便宜留數日以數騎送至縉山道院數騎翩翩别古燕北關已渡興無邊飄飄得遂終身願馬上間吟入洞天又便風送我到嘉山枕石眠雲自在間耳內不聞塵巿鬧心中乘興憶西關又三九嚴凝雪滿山東風送我過庸關人情却盡天垂祐莫是前程有分間秋陽觀作聞說秋陽景物幽神仙親到此巖頭長春詩句真堪畫處處流傳早晚休又我今信步亦間遊詩賦長吟興未休遙想天長名重客幾人再得到巖頭又名山曾度無窮數不似秋陽一景幽去歲真仙曾此過今冬間客也來遊春日秋陽地僻遠皇州未覺東君造化幽莫訝春光來覺晚和風咫尺到巖頭又一身無繫任天涯蓬轉萍浮度歲華不問故鄉安且樂因緣靜處便為家龍陽觀清眀日述物上施為不動情六根安泰自和平三田氣滿千魔盡一點光通萬法明又物外間吟格調清爽人胸臆豁迷情慧風飄蕩迷雲散放出從來皓月明山後暮春雪春盡寒雲忽作雷北山玉屑已成堆妖桃艷杏何曾見只有梨花幾樹開西關外與大使華宗選庵地數騎翩翩關外來洞天遊戲散心懷不求親戚人情厚唯願相知道眼開又關外間居景甚幽山深河遠水長流不須洗耳心常靜誰望聲名繼許由龍陽觀新成後園可五畝有老松一株周回種瓜日耘其苗因憩於老松之下呈同道隨師福薄未同塵供養難消便退身自笑不能成大器龍陽甘作種瓜人龍陽觀後有老松一株馮君讚其孤秀長久不更變耳龍陽可羡古松青柯葉經冬不變更孤秀亭亭堪作伴豈同花草片時榮㶟陽東至縉山可二百里所産之物他處未可及也懷來玉液德興花未讓中原景物嘉更有間人真受用一川麻麥是生涯重午日與德興府道衆遊白貼山靈境寺為求出世遠塵寰一上西峰六十盤得到洞天清絶處使人特地覺心安又白髮蒼顔學道流觀山玩水且優游少年門下多勤苦老後身心得自由無所取實自然可用心耳對月臨風最愛吟拈來放去不勞心自知出語皆空相惟遇通人是賞音仲夏過武川道友以詩留過夏答云龍陽七月間立殿有瓜已熟因作是詩耳因緣到處是生涯功滿三千結實花來日龍陽曾有約上梁已許啖新瓜五夫人宅見怪柏禪床作古柏禪床稱道家相逢真箇好生涯終朝共坐忘言論各守清貞度歲華堅辭道友欲赴龍陽武川住夏勝龍陽六月軒窗風自凉只恐無功辭去早不能待得好瓜嘗退居巖穴忽一日潘士送師號賜清和大師人回有詩上謝降心學道出塵魔决要修真上大羅三十年來功未就虛名賜我號清和又昔日玉清曾拄紫今朝巖下肯披羅幻身任使經千變且保安間一氣和又克己修真較少魔從來本分可張羅如今潦倒加師號有愧神仙張志和又糲飯充腸戰退魔弊衣遮體勝紈羅浮名浮利忙中亂實行實功靜處多山中雨過賞月雨霽西山瑩靜天分明寶鑑碧空懸道人賞玩中宵坐為愛靈光一點圓又雨過西山月最明中秋共賞稱幽情寒光照破昏魔膽一夜無眠徹骨清又山靜雲收入夜清月光澄徹九霄明照人肝膽無他慮惟有詩情與道情借道録段公詩韻述行盡千山及萬山觀來無處可開顔唯餘關外煙霞景却在虛無縹眇間寶玄堂西齊號曰觀妙堂以段公詩韻偶得一絶獨坐玄宫觀妙堂忘言默默內韜光有朝養就渾淪性塞破乾坤沒處藏和衆賢赤石詩韻赭石頻磨不讓朱解開疑句樂真如秪因剖析羣經旨一點能通萬古書又美石精金總在山未同此物代朱顔點開玉訣分明處疑惑都忘咫尺間自嘆虛名於身何益昨日名卑心不樂今朝名重復如何人情未解平常足空惹貪求罪業多詠今古太古玄風事若何無為無作自清和嗟嗟衰世人情厚種下無邊業障魔人求題架鷂圖靈明俊健貼天摩降伏機關保太和常似目前休歇去等間不放過新羅深入峽裏遊團山道院留題滚滚長河千里來亂山重疊峽門開勢隨曲屈無窮數流入東洋幾去回又二峽峥嶸氣象雄團山水浸畫屏中眼前妙景紅塵外疑是蓬萊第一宫武川送道友至樊山縣回三絶武川别後却歸燕際會應難仗有緣早是琳宫催督緊那堪石炭鬥生煙又只為吾師葬古燕蹉跎應物且隨緣修真最怕傷和氣養性休生火與煙又雪嶺皚皚南接燕穿山渡水我因緣一朝得達長春境香滿琳宫結瑞煙庚寅年正旦間吟一韻十絶談玄論妙話頭清意曲心迷轉不明盡道利他全至德何曾損己半分行又劫運殘傷氣未清天開衆善漸分明羣生普化歸真教萬象光輝合度行又萬籟沉沉一氣清三陽赫赫九光明人間榮顯非吾願頗愛存心靜處行又寸心不昧氣長清舉意無私道漸明十載行周三界上一時功滿九天行又物外間吟别是清磨開慧刃道心明萬花叢裏披衣卧百尺竿頭進步行又至道夷然極目清縱橫無礙四方明時人未信真空路試與間人作伴行又仙宫紫府有餘清閬苑瑶臺眼界明六六洞前乘鳳過三三天上步雲行又天無覆翳朗然清聖帝真王日月明共喜鬢斑該詔下太平國內自由行又長春景物自然清西閣東臺四望明羽客仙官交互轉蓬頭丫髻往來行又了道真仙萬古清垂言立教訓聰明上人得意忘言坐終日騰騰獨自行庚寅年通仙觀醮罷復回以詩别道友元帥監軍久厭人間酷愛山山中分薄又東還功虧未免隨緣轉猶自區區不放間又徘徊數日戀西山書疏相邀便索還自歎鬢斑年已老人情仍未許教間又千里縱橫一帶山數年留意幾來還行時不避崎嶇險指望終身永占間又燕中邀我出嘉山數騎翩翩東復還不是白雲香火冷本心縱意且清間又疊疊重重無數山道人遊歷不知還未通下手全真妙誰得逍遙自在間又五絶新吟别此山此山别後幾時還若將動靜能雙遣到處無心便得間留别河山道衆會首水聲山色本無情山水之間神自清不是此間人事重重來憶望樂平生又樂道忘機適本情遊山玩水眼偏眀老來不得安間處却使東西南北行又玄教開迷遠世情世情絶盡道心明當初來後無多事只為情深有死生跋十老圖十箇間人間又清清間眼看甚分明教