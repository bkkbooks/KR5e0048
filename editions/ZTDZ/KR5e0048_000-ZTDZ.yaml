body:
  text: 清和眞人尹志平撰七言絕句金山自宣德州至田相公營約七八千里乃金山之北也西北行程近八千却成南下過金山金山更向西南望纔見陰山縹緲間又曾從神仙日下遊五千里外水分頭時人只解東溟注不見長河西北流又西出陰山萬里多一重山外一重河大河五次親曾渡餘外山河未見他過大石林牙契丹國大石是契丹語學士名林牙是小名中原呼大石林牙爲國號遼因金破失家鄉西走番戎萬里疆十載經營無定止却來此地務農桑又羣雄戰力得農桑大石林牙號國王幾帝聚兵成百萬到今衰落亦城荒西域物熟節氣比中原較早故記之止渴黄梅已得嘗充飢素椹又持將時當小滿纔初夏椹熟梅黄麥亦黄師適有他往而雲水高人踵門者日無一二因作此師去交朋來往稀知心還似不相知胸中有志忘人事與我眞情正所宜唯太守家李提控日逐一過此道難行步步高時人見者謾徒勞隴西道友知何意忙裏偷閑日一遭自詠世念如今已不生惟思道德未精誠蒙師訓教經千百是處無過苦己行段公覓得小魚放生乞得纖鱗免受烹放歸溪水任遊行莫言他日成鯨去目下從容也暢情寶玄堂作出門開眼見西山只爲縁輕未得還身在葆光雖散誕此心常憶白雲間和陳學士西山終日有雲煙只爲人心未了然誰肯迴頭林下問本來面目是眞仙和趙講師休向心田挂一毫囑君四句記來牢衆中不見他人過便許先生道德高劉宣差病索詩欲求輕健得安然試伴長春向寶玄百日消踈如肯受他年骨壯自神全蒙師㫖去山東别燕京偶得一絶西域歸來萬里餘區區尚未得幽居他時若到安閑處靜掩柴扉不出廬和王道録物物知空任去來頭頭心上覺花開是非過耳休重問道德終身莫下懷又教風普振遇長春豈擇官寮與士民箇箇携將歸紫府人人點化出紅塵眞人有天上人間四絶依韻奉和天上眞仙無事忙人間愚昧自相妨不知心是根源主終日空勞禮十方又天上羣仙心本同人間萬法總虚空不知道德渾淪妙猶自談西與說東又天上莊嚴道力成人間法像善經營不知上聖垂方便執性昏昧幾箇明又天上眞功達者稀人間立像要歸依若人頓悟無生理便是吾門最上機燕京會首間作福作福須從損己求修眞只要肯心休古今賢達無多事福慧雙全第一流自詠自顧微軀劣弱多尋常五臟却安和雖然未達青霄去幸免今生苦戰魔又人羡剛强是俊英我憐柔弱得全生試觀舉世貪名者盡在塵中苦戰爭又受教師眞三十年幾迴責我不周全暗中速改即成老死上頭來尚未圓寶玄堂下得房二間兩間靜室一間空片席安眠樂在中莫怪忘貧隨分過都縁造道未精通又暖室明窗我則眠返思天下有餘寒三冬誰得優游過多被刀兵歲歲殘又靜室安居明更清等閑不惹世間情從他外景魔千遍一片眞心不解驚又本來一點最孤靈染着人情萬事生欲要歸根清浄去應須返樸入圓成又用時行道學長春捨則潜心默契眞一性既通非内外兩般消息没疏親又苦思奇句竟何爭無礙狂吟信筆成樂性發言聊暢道興來自得不求名禪子岀示墨竹圖索詩收得黄山三兩竿展開付與道人看任他塵世光陰急不識榮枯與歳寒道友索茶爽氣自生常灑落睡魔戰退得清凉有爲終是歸生滅無事天然定久長登高白露零時秋意深紛紛紅葉墜寒林黄花亭上三般樂把酒高歌遣興吟自省好靜從來辯正在人先睹事徵求訪妙玄今日始知當日錯忘言忘我性方全又每見恣情招横禍未聞至道惹非灾古今仙分縁何得都是存心靜處來寶玄堂月下聞鴈燕山空闊夜彌清坐聽征鴻一兩聲豪客營營心有着幽人寂寂耳偏明又寶玄秋後轉加清靜夜沉沉聞鴈聲默坐睡魔難着摸月光心竅兩分明看雞冠花羣紅十日多零落純紫三秋尚耐風莫似閑花看一例性根禀受不相同談論各處見解未知實際贈陳學士人間口鼔未能窮出世清談與箇中誰解窗眀猶紙隔外頭裏面兩般風吴學士呈眞人詩五篇和之幸爲男子長中州好占仙標第一儔學取龐君並許氏全家輕舉免荒丘又一身本分樂幽居免却人間虚過譽性靜自然通正教心閑何必苦看書又修眞無志望天然推了明年又一年只待陰公傳的信此時何處覓神仙又人無决烈不能閑暮去朝來鬢漸斑都道林泉堪養道古今幾箇到家山天長觀作浮名輕染即成魔況復人情事轉多着景因循無决斷前程終久待如何陳學士覓冠簪詩愛與人交心見心等閑未肯許冠簪先生骨相非塵俗林下何時肯重尋燕京劉會首出家要住西山上方雲峯觀贈詩二首教在幽燕大闡開度人千萬會中來唯君得味心先覺靜住西山更莫迴又入道彭城最有縁專投誓狀叩重玄而今便作雲峰主未到蓬萊已是仙寶玄堂偶得看破身空萬法空寂然不動感而通眞常應物渾無礙變化神靈顯聖功又日逐東生西復沉浮雲短景更相侵行年六十老將至但向虛齋寶寸陰捉住無眀莫縱無明業火生無明起處是眞情觸來看破無明妙便把無明作我明修行五更頌晚參罷後一更初收拾靈光入太虛耳内不聞塵事亂性中寂寂樂無餘又二更寂寂樂眞閑一氣綿綿任往還行滿三田陰鬼滅功成九轉列仙班又三更三點一陽生六甲三元五氣清不是性根超造化如何命寶得圓成又四更魔退罷驅兵穩睡安眠賀太平夢裏分明無所著覺來依舊有餘清又五更五點五更殘一志堅剛靜若山休道神仙無處覓長生只在寸心間苦辭眞人往縉山大劫紛紛尚未安辭師别衆鐵心肝道人决烈將何喻死到頭來更是難甲申年十一月二十四日辭師會劉便宜留數日以數騎送至縉山道院數騎翩翩别古燕北關已渡興無邊飄飄得遂終身願馬上閑吟入洞天又便風送我到嘉山枕石眠雲自在閑耳内不聞塵巿鬧心中乘興憶西關又三九嚴凝雪滿山東風送我過庸關人情却盡天垂祐莫是前程有分閑秋陽觀作聞說秋陽景物幽神仙親到此巖頭長春詩句眞堪畫處處流傳早晚休又我今信步亦閑遊詩賦長吟興未休遥想天長名重客幾人再得到巖頭又名山曾度無窮數不似秋陽一景幽去歲眞仙曾此過今冬閑客也來遊春日秋陽地僻遠皇州未覺東君造化幽莫訝春光來覺晩和風咫尺到巖頭又一身無繫任天涯蓬轉萍浮度歲華不問故鄉安且樂因縁靜處便爲家龍陽觀清眀日述物上施爲不動情六根安泰自和平三田氣滿千魔盡一點光通萬法明又物外閑吟格調清爽人胸臆豁迷情慧風飄蕩迷雲散放出從來皓月明山後暮春雪春盡寒雲忽作雷北山玉屑已成堆妖桃艶杏何曾見只有梨花幾樹開西關外與大使華宗選庵地數騎翩翩關外來洞天遊戲散心懷不求親戚人情厚唯願相知道眼開又關外閑居景甚幽山深河遠水長流不須洗耳心常靜誰望聲名繼許由龍陽觀新成後園可五畝有老松一株周迴種瓜日耘其苗因憩於老松之下呈同道隨師福薄未同塵供養難消便退身自笑不能成大器龍陽甘作種瓜人龍陽觀後有老松一株馮君讚其孤秀長久不更變耳龍陽可羡古松青柯葉經冬不變更孤秀亭亭堪作伴豈同花草片時榮㶟陽東至縉山可二百里所産之物他處未可及也懷來玉液德興花未讓中原景物嘉更有閑人眞受用一川麻麥是生涯重午日與德興府道衆遊白貼山靈境寺爲求出世遠塵寰一上西峰六十盤得到洞天清絶處使人特地覺心安又白髮蒼顔學道流觀山翫水且優游少年門下多勤苦老後身心得自由無所取實自然可用心耳對月臨風最愛吟拈來放去不勞心自知出語皆空相惟遇通人是賞音仲夏過武川道友以詩留過夏答云龍陽七月間立殿有瓜已熟因作是詩耳因縁到處是生涯功滿三千結實花來日龍陽曾有約上梁已許啗新瓜五夫人宅見怪柏禪床作古柏禪床稱道家相逢眞箇好生涯終朝共坐忘言論各守清貞度歲華堅辭道友欲赴龍陽武川住夏勝龍陽六月軒窗風自凉只恐無功辭去早不能待得好瓜嘗退居巖穴忽一日潘士送師號賜清和大師人迴有詩上謝降心學道出塵魔决要修眞上大羅三十年來功未就虛名賜我號清和又昔日玉清曾拄紫今朝巖下肯披羅幻身任使經千變且保安閑一氣和又克己修眞較少魔從來本分可張羅如今潦倒加師號有愧神仙張志和又糲飯充腸戰退魔弊衣遮體勝紈羅浮名浮利忙中亂實行實功靜處多山中雨過賞月雨霽西山瑩靜天分明寶鑑碧空懸道人賞翫中宵坐爲愛靈光一點圓又雨過西山月最明中秋共賞稱幽情寒光照破昏魔膽一夜無眠徹骨清又山靜雲收入夜清月光澄徹九霄明照人肝膽無他慮惟有詩情與道情借道録段公詩韻述行盡千山及萬山觀來無處可開顔唯餘關外煙霞景却在虚無縹緲間寶玄堂西齋號曰觀妙堂以段公詩韻偶得一絶獨坐玄宫觀妙堂忘言默默内韜光有朝養就渾淪性塞破乾坤没處藏和衆賢赤石詩韻赭石頻磨不讓朱解開疑句樂眞如秪因剖析羣經旨一點能通萬古書又美石精金總在山未同此物代朱顔點開玉訣分明處疑惑都忘咫尺間自嘆虚名於身何益昨日名卑心不樂今朝名重復如何人情未解平常足空惹貪求罪業多詠今古太古玄風事若何無爲無作自清和嗟嗟衰世人情厚種下無邊業障魔人求題架鷂圖靈明俊健貼天摩降伏機關保太和常似目前休歇去等閑不放過新羅深入峽裏遊團山道院留題滚滚長河千里來亂山重疊峽門開勢隨曲屈無窮數流入東洋幾去迴又二峽峥嶸氣象雄團山水浸畫屏中眼前妙景紅塵外疑是蓬萊第一宫武川送道友至樊山縣回三絶武川别後却歸燕際會應難仗有縁早是琳宫催督緊那堪石炭鬥生煙又只爲吾師葬古燕蹉跎應物且隨縁修眞最怕傷和氣養性休生火與煙又雪嶺皚皚南接燕穿山渡水我因縁一朝得達長春境香滿琳宫結瑞煙庚寅年正旦閑吟一韻十絶談玄論妙話頭清意曲心迷轉不明盡道利他全至德何曾損己半分行又劫運殘傷氣未清天開衆善漸分明羣生普化歸眞教萬象光輝合度行又萬籟沉沉一氣清三陽赫赫九光明人間榮顯非吾願頗愛存心靜處行又寸心不昧氣長清舉意無私道漸明十載行周三界上一時功滿九天行又物外閑吟别是清磨開慧刃道心明萬花叢裏披衣卧百尺竿頭進步行又至道夷然極目清縱橫無礙四方明時人未信眞空路試與閑人作伴行又仙宫紫府有餘清閬苑瑶臺眼界明六六洞前乘鳳過三三天上步雲行又天無覆翳朗然清聖帝眞王日月明共喜鬢斑該詔下太平國内自由行又長春景物自然清西閣東臺四望明羽客仙官交互轉蓬頭丫髻往來行又了道眞仙萬古清垂言立教訓聰明上人得意忘言坐終日騰騰獨自行庚寅年通仙觀醮罷復迴以詩别道友元帥監軍久厭人間酷愛山山中分薄又東還功虧未免隨縁轉猶自區區不放閑又徘徊數日戀西山書疏相邀便索還自歎鬢斑年已老人情仍未許教閑又千里縱橫一帶山數年留意幾來還行時不避崎嶇險指望終身永占閑又燕中邀我出嘉山數騎翩翩東復還不是白雲香火冷本心縱意且清閑又疊疊重重無數山道人遊歷不知還未通下手全眞妙誰得逍遥自在閑又五絶新吟别此山此山别後幾時還若將動靜能雙遣到處無心便得閑留别河山道衆會首水聲山色本無情山水之間神自清不是此間人事重重來憶望樂平生又樂道忘機適本情遊山翫水眼偏眀老來不得安閑處却使東西南北行又玄教開迷遠世情世情絶盡道心明當初來後無多事只爲情深有死生跋十老圖十箇閑人閑又清清閑眼看甚分明教君試向閑中坐閑裏功夫是怎生礬山先天觀住夏因時勸衆西南仍有大兵荒東北安居夏月凉宜向此間行吉善勤修道德名香又大劫紛紛到處荒幸然此地得清凉勸君加志修眞福漸覺無爲清浄香又曾從先師歷大荒歸來惟喜此清凉干戈未息先康泰蓋爲人淳德行香又人人未悟性多荒安得逍遥心地凉識破機關歸物外自然道德自然香又鍊性通眞意不荒任教造物變炎凉功成跨鶴歸蓬島留得高名萬古香別礬山道友物外逍遥遠世魔無爲無作保清和我來幾度人情熟大理推窮善者多又抱一無離物外遊飄飄獨駕大神舟茫茫苦海人無數誰肯灰心上釣鈎又忠言普勸早回頭勸不回頭陷九幽大聖無由提得出目前認正早吞鈎詠先天觀殿後湧金池作木牌於池面戒物觸穢耳滚滚靈泉歲月深分毫垢穢莫教侵世人只見無涯水唯我看時不盡金道過燕臺清水村馬公宅宿滯雨扶風邀我動天心一夜雲生雨作霖萬物西成將有信千金難買一知音述懷學道年深始得成一番魔過一番新頻逢魔處心休變魔盡才明一點眞又七眞修德動天顔一舉玄風過玉關水調歌頭明有驗大開門户倚燕山崞州赴供三絶常足軒居恰一年身心自覺稍安然教門使我知難免不避迢遥赴醮筵又嶺北風寒自古傳三冬遠涉鴈門川道人慈惠堪爲寶度死哀生作善縁又暫别燕城處順堂代師行化歷他方本非留意攀縁動醮主誠心不可忘題墨竹墨君寫就四時春葉葉枝枝迥絶塵奪得化工權在手一番拈出一番新常足軒中自述常足軒中山海全更兼風月伴流年人求見者無他語盡唤長春小洞天又小軒山海盡方全常足爲名佚老年好向此間閑自在更於何處覓壺天過晉安府南新莊贈杜道人六歲出家九十一一真明透四三七今朝幸遇宿縁深法法俱忘事事畢偶得收拾輪竿罷釣鈎諸縁頓息便休休情忘意滅無多事彼岸高登不用舟又不迷香餌不吞鈎便得安閑事事休雨笠煙簑常作伴清江穩駕一孤舟又好把諸縁一筆鈎修眞須向死前休茫茫苦海波濤急歸去來兮得岸舟示衆塗川九夏清凉坐崇義三冬自在眠只爲從來懷道念雲游到處得安然又莫慮年深功未全一朝行滿自忘眠修眞非是尋常事要識然中然不然又普勸高明後學仙莫貪嗜慾恣高眠時時道德相參問自證元初合自然和寂通居士韻修眞功果若機梭不是虛頭且恁麽頓悟寂通無慾處箇中消息自然和通仙觀作寄燕山馮公輩一帶西山總屬燕燕山堪可度殘年吾門本即修眞客來向山中便是仙又也無香餌也無鈎空設輪竿傍釣舟目擊無言知這意何須苦口勸同流贈石殿試我有清閑欲付人人無分量敢全眞石中懷玉還能保物外逍遥别是春過高家鋪大山心裏小庵兒暫過何曾一日期却愛洞天人不到遷延住了許多時又三三兩兩小孩兒也會擎拳作禮儀到處善縁天意順前程不遠太平時又只因靜處見嬰兒試問行人何日知功滿三千方際會行成八百遇佳時過渾源亂嶺關下冬一日出礬山三九初行亂嶺關會衆送迎多歎息道人難處也開顔又時當歲久歷西山纔過關來又一關寒氣着鬚眞老相朔風吹面似童顔又九九嚴凝雪滿山恰如韓子渡藍關一行道衆眞堪畫雪鬢霜髯變老顔嶽神山小亨詩二絶萬仞峰前一小亭横眠正坐眼中明目前大道人難見終日逍遥自快情又萬仞峰前一草庵終朝興味坐偏甘有人來話人間事閉目無言到晩參懷仁縣年日作去年崇義添新歲今日懷仁换舊年更過周天十二度賀正甚處再團圓崞州南陽村紫微觀和移剌中書陳秀玉韻三教雖同人不同既言西是必非東目前便是分明處了一眞通不二宫崇眞觀劉講師請齋初過鴈門逢地角漸臨滹水見天涯如今反作中原地四海和同即一家乙未暮春因過交城縣秀野園有詩三絶以廣其秀野之意秀野新城當亂離覃君好事特然奇園中花木俱非俗家内兒童盡賦詩又暮春秀野正當時桑下妖紅别是奇兩事不偏誰得悟圓明消息少人知又因遊秀野過疏籬入眼堪憐錦樹奇若解村東王老意請公休記百花詩因得平遥縣清虛觀每求淡薄念深山却得清虚佚老顔古柏靜觀堪作伴無心無慮四時閑潞州東北吴兒谷口黎涉二縣長官會首接送往來不致有失兼立觀同積福行耳書來以詩迴答南北縱橫千里山君當要路涉黎間幸臨權勢宜方便接引行人出險關贈靳寶童蓬頭日用道心堅好伴高公作小仙外學應縁除四相内修活業保三田忻州張同知見請未能即應以詩答之平遥暫别到平陽一箇身軀幾處忙常恨功虧無變化不能普照應諸方乙未季秋至介休縣洪山明霞觀作洪山佳景洞天幽下杭清巖瀑布流更上高原三四里興來閑步到泉頭過汾州義常村靈源觀土埪宿土洞彎跧可避乖寒冬打睡日高齋有時暴客專相訪更入深垞不出來太原平陽兩路經遊迎送者無間斷兩路應縁春復秋來迎去送暫無休人心不讓汾陽水伴我西南直到頭詠河津紫金山老君峰我來親筆記行蹤四顧山河是要衝仙境清高名自古至今呼作老君峰過河津士庶求詩洪波三面北圍山中建津城禹稷間道過相邀連信速滿川香火盡開顔與西巖張閑話莫問林泉莫問山清虛都在片心間若能常把人情遠遠盡人情便是閑題新張村庵身輕豈慮天涯遠性靜何愁地角賒京兆歸來當仲夏清庵快意日將斜答楊漢卿青霄有路果能攀要識眞閑非等閑情性磨礱離四相調和眞息透三關題馬谷觀音閣馬谷來時正暮秋一溪雲水好程頭衆人不解予心樂飯罷從容獨上樓儒士郭公以詩求安樂法浩然一點要方圓直養無私滿大千變化往來三界外何愁耳順不延年登前高山地角天涯在目前前高堪作畫圖傳有人來問予名字無數松間一散仙前高山得平遥衆官請書遂寄新得前高代崞西松巖密茂數難知幼時常慕山中樂老也閑居正合宜身退三絶寄燕山同道心退應當即有年而今身退兩俱全玄玄妙妙忘談論浄浄清清合自然又承教行縁數十年燕山宫觀稍周全終南再舉皆天意恰正歸來事了然又學道隨師三十年功虧尚自未能全風波世路經千險誰解心頭只坦然示衆松風入耳昏沉少世事經心濁亂多幸遇洞天清絶處勸君休縱睡魂魔又莫問修行淺與深道人影子道人心既知道理分明處可惜輕狂廢寸陰寄平遥縣馬會首馬公向老認前頭識破人間便好休且向太平尋久計閑人相伴度春秋長春宫同袍策馬於前高山下爲雪阻故賦一絶以寄耳湛湛清虚不立言報人氣象應無偏迢迢千里來相訪雪擁山門馬不前前高山連日雪戲題雪霧濛濛不暫休青松緑檜也添愁更因書疏東來急一夜青山盡白頭沁城龜山遊憩得三絶銅川已見可開顔闔郡民蘇山水間更有清高堪賞處興來閑步上龜山又上得龜山四望明世間觀透快人情我今幸遇清凉地唯願諸方早太平又每到龜山照四方四方何處不窮荒從今覺徹人間世酷暑來時心也凉閑中體性玄虚感處通還能應感便玲瓏玲瓏養就無中妙妙體眞空空不空又修眞要解祖和宗宗祖時時顯聖功借問祖宗在何處能言能語性玲瓏又默地悟時識祖宗丘劉譚馬好家風門中志士聽予勸弩力勤修要始終丁酉歲中秋沁城寄燕山道衆燕山已别恰三秋萬丈風波到岸頭更謝衆眞憐我老銅川米麥勝他州因看子瞻壁間録偶得一絶道人兀兀三盃酒禪客昏昏一覺眠似是似非誰可辯勸君休聽俗家言贈馬會首逢人未話形容老見者先云道德高虚室只宜常自在灰心莫掛一絲毫重午日别平遥縣李酒使寂靜身雲任往來從教世俗有心猜時當重午離仙院滿檻葵花不見開答大名府請在路染疾不赴昔日曾聞師受魔而今傳付老清和前頭無限眞遊境不許功虧得見他贈牛仙學道須憑識見高遇魔不退轉堅牢若能悟得無生滅免向人間更一遭濰陽住時有清逸庵數與閑上尋閑三十年後領衆興縁至今七十却返本矣昔在濰陽三十年今年七十罷玄談靜中記得眞閑處却似當初清逸庵道人劉志希獻雕木七眞小像一點靈光用處眞精窮衆妙自通神還能更悟元初妙刻出從來無相身五華山道院五華眞本是林泉萬木峥嶸接水源試問往來遊歷者山庵幾處得周全又五華見者盡開顔平路行來便是山道院清幽仙境界林泉靜處勝人間又玉蓮池上玉蓮亭對水臨山眼界清走遍人間歸計晚五華堪可寄餘齡遊五華五絶答王子正從師應詔起濰萊教在燕山次第開昔日鍊丹修養處今朝閑客又重來又青荷柄柄出方池正闕陶潛金菊籬盛夏栽培香漸吐重陽相待未爲遲又五華再變類蓬宫一片清凉眼界中天賜老身閑自在五華池畔快哉風又何人通得内雲遊八表縱橫不解憂清浄境中無盡藏問君何處是程頭又絶盡人情見道情道情仍是强安名若人能悟無生妙越過南華與赤城五言律詩贊清浄經三能清浄理知者悟眞情上德本無我下愚元好爭湛然遺所照應物轉分明至妙從何入直常性自平戒不足有衣能禦寒有食可充飢雨事如虧一使人心意欹還如衣食足猶自縱貪癡忽爾業盈滿臨危更怨誰處順堂中秋作處順中秋靜雲朋和氣添魔精潛海角明月出山尖萬國同歡賞千門共喜瞻相看終夕坐都覺性安恬礬山先天觀作先到終有意雲水已無心隱跡唯求遠埋名恨未深秋陽辭益友春暖訪知音爲慕西山靜免教人事侵又守道忘塵累安居慕德鄰坐中無俗客席上盡高人養氣若龜息鍊形如石皴爲求眞實相認取本來身縉山秋陽觀乙酉正月上元木凌降垂柳千條白華燈萬盞紅上天呈異瑞厚地顯神工碧樹開瓊蘂青山變老翁滿巖諸草木盡化玉玲瓏自乙酉六月至丙戌四月八日尚無雨時在山後龍陽觀因有是詩秋無三寸雨春有十分風冬雪又太薄夏苗焉得豐何曾求己過都只罪神功我已西關去猶嗟歲計窮與隴西翁相别二十年識時未及心交今會話間乃知其心同往西山故録之耳昔時曾見面今日又論心共約西山去同登北嶺吟逍遥出京巿放曠入山林萬疊峰巒遠前程步步深屢有請疏仍加以眞人號偶得五言長歎爲慕眞人行人因唤我眞眞功若果足何慮不長春學道非虛妄修眞仗實因常如七祖志報應豈虧人王禪師病以詩贈之古道雖能執今時亦可通修眞合要妙康泰自和沖法盡身輕舉丹無體恭癃本來圓相現不許一塵蒙題南庵閑步南庵去南庵最適情門前溪水緑窗外竹風清處險常知足忘貪總不爭只因身自在一片道心明木林老久病過歲今年辛卯成就下元醮事幻身雖久病道念愈精誠黄籙通幽府赤書達上清死魂忻濟度生命賀圓成至道非由廣如何出死生木林老仙去以詩吊之子已返眞去予今爲子來知心十載外同伴二年迴來後身如夢歸時火作灰死生常理耳何必苦傷哀崞州神清觀有道判莊公談玄之次因贈言激發之耳入夜談玄教神清坐二更門中無列子席下見莊生性靜塵難染心通行易成能窮方外義一片道心明五華山喜雨四月風方息五華雨有餘羣生皆喜悦我亦保安居夏種苗將足秋成事不虛往來遊戲樂時駕小雲輿已亥歲四月陰霧七日始覩日月之光耳四月陽方壯忽然陰氣昇昏迷天地暗黯慘鬼神驚七日如混沌太陰不放晴一朝雲霧歛日月一般明答王子正幸然逢正法便是宿根深勿逐古人跡唯搜自己心目前甚易見身外果難尋清浄一言了勝如萬鎰金五言長篇辛卯東路鹽場醮過景州贈東方道衆不得西山去天教東路行心空常合道性僻未全明觀妙入無相逐邊屬有情全眞修實德着假戀虚名見色如空色聞聲悟寂聲動時無少欠靜處有餘清縱欲道難悟收心行易成幻身元係假實性本來平莫覓鉛汞法休教煙火生同流聽苦勸别有好前程岀京寄長春宫道衆離京五十日紙寫百千張信士盈郊接沉煙滿路香隨方皆道化無處不仙鄉鍊性通三界馳名遍十方有心棲靜定無意戀聲揚行道因師訓立身須自剛民安修善路國泰誦經章應命無高下隨縁任短長七眞開正教萬聖助明玉行住由天意奈何無處藏重修五華觀喜題昔日燒丹院今爲養老庵愛山非謂景慕靜不名貪四海水雲定五華歸計堪採薪墻脚北汲水竈頭南食粥渾身暖啜茶滿口甘一眞離妄想萬法更何參有客不迎送無賓罷接談任教人見怪自喜老來憨葛洪山周姑書來以詩答之古燕相别後乘馬入山東有意尋王烈無縁到葛洪書來知隱遯人去表行蹤鍊性青松下棲眞碧落中修成高士體養就達人風異日功圓了應同竹化龍盤山棲雲觀盤山路不深道院正當心一谷水流細滿山松布陰庵前閑散髮亭上靜披襟羽客朝舂藥幽人夜操琴雲生添瑞景風動轉清音此地全眞樂予知勝萬金五言絕句段道録數載始會面因出衆人詩卷繼韻二絶莫覓塵中景好尋方外春含光成大德出語自驚人又恰似初相别又逢幾度春滿懷風月事分付箇中人長春宫警世十首劫運陰陽數天灾人自招一心常吉善百禍永潜消又性正出言直心偏口自訛正邪皆自定議論復如何又心平憎愛少意曲是非多逐惡沉幽境歸眞潜大羅又降心知罪福縱性屬邪魔上士塵情少愚人嗜慾多又好辯機關惡無爭滋味長欺謾成地獄平等是天堂又有欲般般着無情事事休明心知道妙見性悟眞修又寂寂元無染迷迷自有情悟來絶四象覺後現三清又般般心地濁句句話頭清得勢欺人重失時禍不輕又澄神知道大絶慮覺身空了見元初妙慧光無不通又三田丹寶實四海自馳名吾道千年遇先師萬里行題山水石硯屏妙有通神化虚無含至靈能知天地始元氣自分形因魔示衆逢魔無動念臨事易安心叮囑門中士再三惜寸陰又天魔難改節人事易勞心叮囑門中士再三惜寸陰又魔深重發志事淺愈防心叮囑門中士再三惜寸陰又因魔成實德遇境見眞心叮囑門中士再三惜寸陰又却魔憑有慧滅我用無心叮囑門中士再三惜寸陰又千魔無濁行百鍊盡凡心叮囑門中士再三惜寸陰五華山寄王子正三絶未明三島約且喜五華春雖則近人世幸然已出塵又暮年知短景度日謝長春訓我離三毒應當出六塵又五華觀不足四季盡如春終日翛然坐却無一點塵古調詩同道友遊大山寺山重疊河灣環道友邀子上大山山上雲庵三兩間坐中無箇不開顔乙未清明過晉祠今太原古太原今古相參事杳然唯有晋祠廟前水湛湛清流不記年食豆粥寄燕京道衆苦苣菜軟菉豆粥薄二味從來偏愛一眞永得安樂食罷後四大冲和飽足時六神踴躍老來得這些受用把世間事都盡忘却語錄示門人天眞道人全眞之教專於性命道德之妙今之學者多不參同予從得道之士丘劉譚馬三十年間口傳心受妙語玄言日用罪福何啻千萬雖是達理眞功實行常虧難以超凡入聖耳今隴西公出家年深斯者不期而會堅求予平昔所得師眞之微言以爲己用兼誨後學不得已略書數端耳夫道者本不遠人奈人自遠之耳人知道釋性命爲一者多矣差别者亦多矣不知行持本有妙性都無眷處慧命相資助一性眞定入大無礙法門混而爲眞一永超生滅得靈通自在目前有驗是爲妙道也如學人堅固行持未至於了達乃宿功有闕也至如一志盡死不墮者再出頭便是通達之人聖賢不肯放過輕提挈則心地便開通道不爲難矣師言要明萬法又要不著萬法既不著萬法是諸法空相也著法者是執指也不著法者知指處也既知指處是謂諸法皆空也以此明白便是箇無拘自在希言保命之人更加物上施爲能轉换决斷慷慨不染不著内外融通積功累行朝夕於是至如便不飛昇做得箇超羣拔俗有見識好漢遇觸處無心假使聰明快言語底人道他不着難爲指點也欲要前程未死之間不可虚度時光寸陰可惜既爲學道之人須要參到箇實際處於師友教誨不可日闕雖自己通明亦當切磋行持以至於見效耳以此方可獨立而不改周行而不殆今略書數事皆得道之人微言教誨於予伏願同志者共行超於彼岸耳直言示重陽宫祐德觀道衆祖庭因縁非小補耳不同他處此乃是上天容許衆聖闡化教門基業之地既在門下者重興修建須憑眞實行用志誠心遇魔阻不生退怠一志積功累行方可消得此箇地面道人會意積功一分比他處十倍如作業亦然若功業大則非要我知惟望衆聖知之如動得衆聖眞差遣我前去親自點勘汝等勞心請求望我前去若積功者少造罪者多一朝禍至非小事也今者人迴以眞實之語布吿重陽宫祐德觀道衆各令通知耳伏望有志道人再三詳審前件語言於汝等深有利益汝等休疑惑便當誠心下手不可遲慢衆眞必無虚負汝處七言絕句重陽將近袁眞人會五華觀詩贈之五華雖則三春秀莫比閑遊九月來萬木斒斕山似錦羣仙聚會小蓬萊寄段眞卿諸公萬朵金蓮同結實五華秋暮正當時重陽嘉會人難遇報與雲朋早要知答王子正休心何必更休書見盡情忘復太初觀透經中無礙處自然心地便清虚葆光集上葆光集中同四清和眞人尹志平撰詞西江月秋陽觀作我愛秋陽地僻松巖來往人稀不勞打坐自忘機兀兀陶陶似醉坐上有山有水心間無是無非朝朝常見白雲飛可以留連適意又我愛西巖氣勢連山帶士豐肥青松緑柳嫩依依更有名花異卉春水涓涓聲細秋陽燁燁光輝此中不用上天梯便是仙家景致又我愛秋陽道衆人人謙讓温和終朝豁暢恣高歌日用不分彼我福地安居自在松間閑步煙蘿先人後己行功多永没非灾横禍又我愛西巖秀麗仙園地發三陽山形曲屈卧龍岡只此人間天上雲舍茅庵掩映仙花異果馨香巿朝客到見清凉舉手應須瞻仰又我愛秋陽天氣一指雲路無迷何勞身外覓曹溪了見三身四智莫問天機深遠休尋大道無爲目前認得這些兒便是全眞苗裔龍陽觀冬至作月魄光通四海龍陽氣滿三田一聲雷動振山川迸出飛光閃電法雨常加有道慈雲廣布無邊此時方顯太平年遂我一生本願又天上仙無懵懂人間性有頑愚門中有幸看經書法性堂堂開悟達理眞明妙有觀空體合虚無慧通靈寶證元初誰解無文不度又進道須憑篤志收心慎勿狂遊聽予苦口勸同流莫待因循皓首緑髮朱顔易改青春白晝難留爭如速悟便回頭認取忠言善誘又山後重興道院燕南仍自干戈道人功行累來多免却非灾横禍每日誦經報國終朝念道降魔福生禍滅養沖和眞靜眞清證果時在天長正當大暑歸山後恰值三秋因事而作九夏天長暑熱三秋山後清凉一川禾黍正蒼蒼了見西成有望論甚天涯海角儘他關外山荒目前無事即仙鄉且恁隨縁豁暢又莫羡喧譁京巿休辭淡薄山家猿啼鶴唳興還加心地清凉無價夜伴清風皓月曉觀緑檜雲霞蓬頭丫髻做生涯堪向幽幄圖畫又窗外横山入畫門前流水堪聽洞天幽處少人行不是塵寰路徑占得靜中風月却迴鬧裏人情湛然六識自安寧一任閑歌閑詠又月裏金烏報曉日中玉兔方眠誰知萬法倒顛顛此理非深非淺認得元初這箇須明無事眞禪人人有分性周圓只爲使他不轉又淺見有知有識深通無悟無迷了然頓覺入夷希此是男兒正智達道豈離方寸明心何在天西終朝閑坐細尋思裂轉機關便是又有欲難超老病無情易變童顔虚心實腹六神安步步清凉彼岸九載能除四相十年决到三山蓬壺閬苑恣遊閑免却人間流轉贈田道人動處休將性動靜中莫使心疑目前端正没關機眞靜眞清便是氣滿三田自實神通八脉方知了然頓覺入無爲到處安心穩地贈萬蓮會衆事事諳來心足般般捨去身輕本初一點要圓成妙語玄言堪聽縱意不知有我收心自覺無明無明滅盡絶塵情便是識心見性入西山路石徑雲梯路險攀蘿攬葛難行洞天深處水山明遠却塵寰視聽土洞安眠穩坐松巖耳靜心清不須更羡許由名便是超凡入聖又非愛青山緑水惟圖隱跡埋名麤衣糲食絶人情養就元初本柄氣結神凝久視虛心實腹長生一朝功滿現三清此是男兒正性勸衆减睡夏日勤修寶殿冬天好鍊頑心三更不縱睡魔侵便是先生戒禁學道休迷妄想修眞莫失叢林無爲功滿恣歌吟自在高眠穩枕常足暢懷盡日觀山翫水終朝常足心休老來佚樂更何求保我陽生九九幸得爲人通道道中别有歸投功成雲步看瀛洲萬古名傳不朽贈張先生日用竈頭然火時教突裏亡煙始終如一志精專也勝往來打轉放下紛紛塵事明通朗朗玄言一朝功到性靈圓便是蓬萊中選寄京師道友只爲功虧行闕故教不免東西自從别後二年期路轉風塵萬里詞寄燕山道衆聽予至囑休疑外縁雖幹内忘機免却前頭懊悔又人事雖然久厭道家爭忍空歸不因勤苦到關西焉得重陽慶會說與門中志士祖庭已見根基終南山色古今奇老者堪爲久計贈儒士王子正本性元虛不二奈何情慾交加人能頓悟道生涯世態分明是假更要深通玄奥須當拂去矜誇含光默默養靈芽便是無爲造化巫山一段雲秋陽觀作十九遊仙子隨師歷八荒西臨回紇大城隍到處見農桑一種靈瓜甚美赤縣幾人知味大千沙界有多般鶴駕復東還又塞北三年轉天西萬里迴飄飄雲駕漸東來無不笑顔開道德峥嶸功大行滿决超三界十方仙子行功圓得見太平年又太上臨關日吾宗受道時七雄戈戟鬭相持何處起慈悲直至西天行化大教普聞天下古今今古類皆同方顯道家風又北海修眞士西巖放曠人别師迢遞過關津物外不沾塵學道須憑决烈一片眞心如鐵九年功滿步雲霞三島是吾家又性燭通天眼心燈放慧光湛然靈物自眞常無處不圓方住世榮華不戀舉措常行方便一朝功滿化雲歸獨步赴瑶池寄天長道衆山後春將暮龍陽景漸佳東園芭欖正開花隨分有生涯道友堅心長久相見時時稽首自然恬淡日和平物外有餘清携杖上禪房山自在三山客逍遥四海賓孤身到處自全眞風月永爲鄰識破浮華虚假誰羡望雲星馬一條柱杖勝龍驂穩步上高岑先天觀作涿鹿今朝到蚩尤往日休坂泉冬夏水長流今古幾春秋因此强兵戰勝直到而今無定一生一殺做冤讎早晩是程頭道友堅留住冬聖地西北有缺可費千功未暇修補待春暖可以完備因縁故述之我有林泉興君無補缺心一方聖境理幽深物外結知音還到春時圓備合是全眞一會功成行滿待他年携手上雲天龍陽觀九日白酒寬懷抱黄花噴鼻香此般眞味慶重陽性月自圓方山後三秋無别幽檻幾叢開徹兩軒各各鬥芳鮮雅勝洞中天勸世道顯清虚妙釋明智慧深仲尼仁義古通今三聖一般心不認忘名默悟只解分門别户一朝合眼見前程悔恨不圓成卜居西關好山萬疊河在其中曲迴上下不啻二三十里渾水波濤兩岸桑麻映日人善地僻可爲終焉之計自號日養老庵以小詞寄之耳萬疊山橫翠千盤河曲長居民安土樂農桑流水落花香卜此安居養老一任形枯心槁不揺不動寄殘年何處覓神仙題通仙觀列翠峰巒秀仙都氣象清三陽端正玉鼇形一氣自天成萬疊雲山深處别是洞天幽圃何人能得久閑居清靜樂無餘催衲襖昨夜西風緊今朝秋意深道人雖則是降心寒暑亦難禁衲襖宜教寬大且要晝披夜蓋一衣猶恐不銷任此外更何尋龍門川溪水同翟老賞月溪水迎霜冷山花帶露鮮良朋共賞玉瞻圓高會興無邊長記西湖萬里素魄澄澄一體今宵相隔正三年渾似夢遊仙贈龍虎夫人北海功還未赤城行已周一身清靜永忘憂何處得閑愁四十正當不惑事事諳來明白樂天知命保安和眞理本無多清水作應運開正教隨時見寶壇衆眞降跡在人間却要列仙班化度羣生無數箇箇盡教開悟一朝功滿到蓬萊劫運免三灾自詠濕熱燕南地清凉山後天陰陽難曉倒顛顛宿業自牽纏二載登程酷暑終日無言無語閑中功行未能圓使我志心堅戒無明一點光明大三千業障深勸君聞早細搜尋莫待禍來侵觸處將身迴轉慧性能生方便這些消息汝還知便是上天梯鳳棲梧秋陽觀作正教流通千載遇浮世忙忙幾箇心開悟猛省輪迴尋出路回頭便是眞仙度行滿功成蓬島去好伴長春自在無思慮更有奇葩千萬樹塵凡未脱誰能覩又世事無涯何日了爭似忘機學我歸山早山下林間常獨笑人心未悟誰能到終日忘言人悄悄暮去朝來更没閑煩惱惜取眞陽身内寶不須服餌容顔好又問道參禪都不會境上閑遊只要心無昧踏碎虚空離六對松巖一覺和衣睡何用人前誇口快一點靈明不許纖塵蓋法性堂堂觀自在歸根復命超三界宣德州見請以此詞答之山後三陽都歷遍宣德朝元不晩須相見數載師前人事倦區區獨自隨風轉幾度天長曾發願糲食麤衣隔斷人情面富貴榮華無意戀不如巖下成修鍊又巖上春光將欲暮可惜春光無計留連住春去秋來分四序一來一去成寒暑歲計謾人人不悟得喪悲歡盡是輪迴趣我欲留言叮囑付人心未解無生路先天觀作山後風光何處好上谷靈蹤自古軒轅廟湧出清流方曲繞森森緑檜知多少雲水閑遊今日到信筆狂吟自在開懷笑萬景難侵心合道全眞妙體圓明了和碧虚壇詞至道幽微何處究妄想邪思便是魔人獸欲要三田苖長秀眞常眞靜眞無朽五氣朝元眞一凑萬語千言須候陰消六今古迷人觀不透神奇枉化爲膿殠又一點靈眀當内究散盡群魔赶退西山獸萬樹瓊花如錦綉長春永占無根朽四海雲朋來往凑上下冲和漸覺陽生六一道靈光通骨透清香换了胞囊殠述懷天下周遊將欲遍十載區區恐負先師願老也休休人事遠遊山翫水隨縁轉報與知音聽我勸劫運刀兵箇箇都親見仍自貪求生愛戀前頭路險如何免太平興國觀作古跡琳宫堪作計檜柏青青宛有長春氣直待功圓方濟會無心默默符天意幸得安然清靜地終日逍遥方寸無縈繫老大不堪心自退紛紛世事何時已先師昔日屢言燕山天下最勝之地當是時果葬於斯以小詞記其意耳天下風光何處好山海潜通無比燕中道四海雲朋來往繞先師默悟知還到既入玄門須悟早誰解修眞此事非草草天意分明容起廟燕山千里來懷抱臨江仙朝元观清以词许之自别都門人事少心頭不掛微塵閑歌閑詠默頤神有中皆妄想無内却全眞取性逍遥雲水客無情淡泊閑人隨縁安樂絶疏親三陽將欲遍五氣自朝元袁夫人住沙漠十年後出家回都作詞以贈之十載飽諳沙漠景一朝復到都門如今一想一傷魂休看蘇武傳莫說漢昭君過去未來都撥置眞師幸遇長春知君道念日添新皇天寧負德后土豈虧人西山靜坐靜坐西山深有益等閑人事稀逢終朝飯飽恣疏慵養成清靜體化出主人公三十年來都亂覓如今認證眞容狂情滅盡法皆空本來無一事剛恁費千功又本是一般孤另物被他染著難知迷雲消散慧風吹何勞身外覓端坐是天西萬語千言終未悟悟來一字成非竿頭進步勿生疑般般都撒手種種自皆離又參透全眞清靜法何勞相上經求好於此處覓蹤由莫生迷執見休要不迴頭眞性如何能寂滅眞空空外閑搜其中無慾認眞修隨機常寂定應物自圓周示衆目對千差無可取心閑一境堪憑眞常不昧谷神清羣魔從此滅一點自圓成物外清吟唯獨樂人間寵辱何驚勸君速悟問前程要求眞實相休論假聰明李行省請予往山東葬三師燕京道衆並士庶皆不許感懷一别濰陽過十載天涯歷遍西戎歸來燕國住仙宫立言明祖教演法繼師蹤天意如何非易測人情到了難窮予心本自愛疏慵却教居海北未許過山東偶得談妙談玄人易悟眞清眞靜難依人間世事不堪爲十方明眼漢學我没操持既悟淳風須返朴終朝朴實相隨含光默默外如癡心明如朗月性靜合刀圭又有相有中容易覓無爲無處難爲終朝作伴影相隨愚人尋不見達者已先知此理勤參搜獲正一條大路無迷勸君速悟莫遲疑常常忘視聽步步入希夷五華山住夏時有道衆見以詞贈之數載崎嶇天下遍而今幸遇林泉飢來喫飯困來眠離城幾一舍别是小壺天坐上水山俱秀發池中開滿青蓮老來功行卒難全未能三島去先作五華仙無俗念龍陽觀道衆索了心一法越三乘妙體果離生滅萬事知空非可取慧性輝輝通徹靜裏乾坤閑中日月堪付知音說家山還到自有無限風月一點無相眞如澄澄湛湛内外難分别要會玄元端的處無縱迷情乖劣勤論幽微頻修祕密參透天機訣此時不了更待何日休歇又參差萬有盡鴻濛一氣生成無極擾擾羣情皆有我寂寂眞空非得有内尋無無中覓有誰是知消息高眞方便唱出玄妙端的此箇隱奥門風須憑智慧清靜開胸臆了見元初眞面目豈羡浮華顔色身寄人間名收仙籍不許纖塵惑神思不動自來天地難測又冬寒夏暑共春花秋月年年無别唯有形容朝暮改不覺催生促滅萬劫昏迷一時開悟好把心休歇纖塵不罣本來一點明徹閑對龜鶴松峰林泉幽圃自在開懷悦行滿功圓朝上會方顯男兒英傑此理非深玄機不遠未悟難分說人間誰解暗中虛度年月又天涯海角任縱横到處一身閑拓世事知空風過耳别有些兒歡樂玉鼎烹煎金爐滚沸鍊就丹砂藥服之歸去化身空外飛躍是則仙道玄微凡塵脱去便得同期約達理通眞功德備豈在幽居巖壑四相消磨三彭遁匿自是人情薄全眞正教正大心地無錯繼人韻同塵混跡悟玄元奥旨深窮莊列會集雲朋扶正教相繼先師無别外貌悠憨内容整整果是如愚拙門清户靜自然顯出高潔長春境界無邊清凉永占處處堪休歇物外壺天清絶處遊戲白雲金闕身寄塵寰性通天外萬事難縈惹六根不動便是無生無滅大安山棲雲觀中秋賞月大安高絶風露清氣爽中秋時節霞友雲朋方聚會共賞山頭明月照徹千峰明通萬壑坐覺心歡悦神清骨冷永超人世生滅看盡此夕風光空勞筆舌妙景如何說普照千門皆可翫不似棲雲高潔小院巖前大寒嶺畔髣髴天相接坐中默想此間堪可棲跡通仙觀作通仙地僻向西山深處倚雲樓跡俯視峰巒千萬疊隔斷紅塵消息閑步烟蘿靜吟風月此事何人識修眞上士更於何處尋覓一帶無盡山川洞天幽圃自有神仙域名利相纏誰得到難伴清虚閑客碧洞高眠清巖穩坐豈羡王侯宅我來幾度此中留意多日論性騰今跨古這靈明覺性本無虧少箇箇圓成誰肯認逐境迷迷顛倒萬種施爲千般做造都向心頭了些兒玄妙問君何日知道不入無相玄門浮名難捨貪看閑花草口解清談心未悟不覺輪迴來到好契眞機驚迴幻夢自在遊三島長生有分永超人世衰老葆光集中葆光集下同五清和眞人尹志平撰江城子和蒼蓋郭秀才韻乘車坐馬走東西論玄規入幽微天下峥嶸隨分立階梯吾教流通天地祐無不喜盡歸依其中消息與誰期解忘機識無爲霞友雲朋心地要平夷抱樸全眞明日用神燦燦性輝輝龍陽觀冬至作六陰消盡一陽生暗藏萌雪花輕九九嚴凝河海結層冰二氣周流無所住陽數足化龍昇歸根復命性靈明過天庭入無形返復天機昇降月華清奪得乾坤眞造化功行滿赴蓬瀛又道人活計日開顔性多寬六神安晦跡韜光無事到心間養就亘初靈底物名利客不如閑人生能有幾多歡老摧殘死生關六道輪迴來往苦艱難好認吾門親至道情慾斷出塵寰又法光普照道門昌出天長入龍陽寶殿圓成朝暮藝心香霞友雲朋休外覓心地穩是天堂燕南河北好悲傷正窮荒受風霜劫運推移何日到仙鄉誰解閑居山後意㶟㶟秀小蓬庄詠臘雪瓊花繚亂玉塵飛滿長堤擁柴扉暖焙窗明安用繡簾幃夜靜雲收銀鑑滿看雪月鬥光輝季冬眞瑞古今奇助寒威顯豐期感動詩人魂魄入希夷謝女多才吟不盡留與俺道人知西山之通仙觀卜以重陽作醮前數日北風嚴惡天氣昏暝小雪微作衆意憂惶八日發牒之後俄爾開霽兩晝夜畢十日陰雪復作萬口一辭讚嘆希有勝縁因作一詞以記其實重陽佳節醮西山暮天寒葉斑斕和氣滿川無箇不開顔滯魄孤魂皆受度功德備出幽關河清谷靜氣閑閑寸心寬保全安白酒黄花高會列仙壇共慶吾門祖師祐衆眞喜萬人歡庚寅年通仙醮罷復迴不遂本願以詞别道友衆醮信玉河别後出西山曉霜寒過重關書疏相邀須索赴清壇度死超生雖好事年已暮鬢成斑修眞未就積功難鍊心寬悟眞閑造化功夫都在片時間斡轉玄機全至德無可欲列仙班別礬山先天觀道友先天欲别意沉吟就清陰散幽襟酷暑全無蚊蚋不相侵清靜安居堪久計住一日勝千金此方道友果堅心日相尋演清音訪道崇眞通古更明今九夏待予無以報臨去也贈荒吟仲冬龍祥蹤跡古仙壇水連山徑彎環玉殿朱門高聳白雲間疑是蓬宫臨白溆眞福地可開顔仲冬遊歷苦無寒道人攢子文歡看盡三峰别後兩閑閑何日復來林下笑散後易聚時難方壺過冬嚴冬共喜小方壺稱幽居論元初話到三更皆似覺清虚萬事有心求不得憑象罔獲玄珠一言了了性如如樂無爲駕雲車朝拜高眞功滿赴仙都速悟人人俱有分聽予勸莫癡愚義州作紛紛世夢暫無安蟻循環少開顔悟道修眞要脱死生關認得元初無一物除妄想斷高攀老來佚樂正宜閑罷輪竿釣舟還物外清遊歷遍古仙壇更待東君傳信息度遼水看閭山又修行還悟宿根深得知音便明心十二時中外境不能侵保命全眞無别用好容易不難尋一時勘破古通今信閑吟翫遥岑海角天涯都是好叢林繼祖承宗行教化享天爵受人欽榆次縣眞常觀作眞常應物要方圓且隨縁行功全眼正心明認得化工權日用無私當直養浩氣滿現胎仙一時慶會興無邊透重玄永綿綿照徹人間幻境豈能堅便約故園堪久計觀八水翫三川沁州神霄宫賞月素光皎潔暮天晴十分明稱幽情賞翫隨時高會盡雲朋今夜澄澄垂普照無此夕得和平碧空如水月盈盈性珠停保長生四海清通何處不圓成更謝高明恩德重臨萬國教門興無夢令龍陽觀春介其間作道友三冬鍊睡鍊做陳摶苗裔咫尺過新春晝夜須當加瑞加瑞加瑞點點直教着地又春日龍陽春睡悟得春光眞意紅日正三竿却被春風驚起驚起驚起萬事一場春寐又閑把心香暗三界十方通徹四海遍天涯都是全眞枝葉枝葉枝葉撞透清宵明月又我向幽窗守拙勘破春花秋月得意便歸來好把身心休歇休歇休歇鍛就一爐春雪又說破勞生如夢箇箇昏迷虚夢默地悟心開達了眞通清夢清夢清夢誰信眞人無夢道無情時在龍陽觀東川秋陽來請丙戌元宵後臨行以詞别之每夜三更問話說破人情虚假箇箇悟眞宗道心通要望秋陽迴意莫縱高眠春睡指日復歸來笑顔開又不避春風迢遞來往默通眞意那箇是吾家信天涯本性玄通無托到處一身安樂了了没西東住雲峰又身逐東川道友有客西山專候眞意是如何囉㖫囉七十古來稀少今我六旬還到浮世不堅牢醉陶陶秋陽觀作答宣德州道友請深謝將書來請纔到西巖春令百鳥正喧呼樂無餘道衆滿川和氣醮罷更看天意縁契合虛空任西東又但願身安心靜誰羡往來迎請正教滿天涯過流沙師意眞慈普度應係群生開悟積行要無邊性方圓別西山道友行遍天涯海角未似西山心樂興盡復東還鬢多斑彼此年過耳順别後有何憑準唯願各心休永無憂又三老共全清福終日遊山不足坐卧白雲中看青峰飯罷東坡石上談笑開懷豁暢妙景可忘憂對清流別蔚州道衆十月蔚羅行化去送來迎車馬和氣滿山川教風傳别後何時再遇唯願各心開悟功積要三千化靈仙又九九嚴凝冰結山後朔風凜冽西去意如何囉㖫囉道友一聲珍重慎勿使他心動志氣要平和道無魔又隨處道人道友勿使人清濃厚凡百在平常少灾殃别後應當西邁接待往來寧耐他日要相參望終南懷仁縣作我愛懷仁冬月炕暖窗明堪歇天意不教閑過南山東去西來非願海角天涯將遍道果尚難成又登程老年退居沁郡奉詔還燕京大長春宫十月小春時令萬物歸根安靜獨我水雲間過東山直指古燕無定老也敢違天命迴首望終南再來參依韻别沁州長官杜帥未達難通天令誰解動中生靜道在有無間隔千山去住絶疑心定任運逍遥隨命終日不迷南更何參減字木蘭花秋陽觀作勸世堆金積玉日日慳貪心未足足上何求直待荒郊卧土丘迴頭有路爭奈愚人迷不悟若悟迴頭免了前程無限愁又勞生喪命誰解衣飡皆分定恣欲貪癡積業如山猶不知一朝有報鐵膽銅心人也懊受罪無休恨不當時聞早修又頑愚不息禍福還如身逐影劫運天灾都是人人心上來若明此理視物應當同自己了見天眞善惡臨時全在人又損人利己貪愛欺瞞何日己害衆成家富貴人前仍自誇陰公暗記死上頭來誰肯替天道無私報應分明各有時又天堂豈遠舉世迷人尋不見地獄非親無限衆生塞斷門聰明上士幸得爲人勤發志志在心平片善無遺道自成縉山川有三觀皆有陽字此間往來故云三陽道士三陽道士坐對雲峰談不二萬法如通盡在忘機冷笑中無明實性此理難詮如何證要證元初認取高空秋月孤秋陽道友見過金波玉液除却嬀川無處覓玉液金波一飲能教五氣和還丹大藥服了令人常快樂大藥還丹福薄衆生要見難一道士岀示杜甫遊春詩卷遊春暢飲萬物熙熙花似錦暢飲遊春迷了從來多少人儒流道士幾箇能通天外志道士儒流誰肯忘情言下休示衆年深學道雖未通靈神氣好學道年深萬景叢中無物侵同流聽勸薄利虚名深可遠聽勸同流放下諸縁宜速修又身心裂轉便是元初眞目面裂轉身心一志如山超古今些兒若悟免却波波來與去若悟些兒萬劫希逢此一時又同塵混世誰解忘言無酒醉混世同塵落魄逍遥甘分貧靈源不昧勝積無涯眞寶貝不昧靈源一氣清成要上天贈龍虎夫人昏昏默默世智聰明孰可測默默昏昏無欲能開衆妙門全眞抱樸無慮無思無做作抱樸全眞入聖超凡只在人西山作修眞近俗初地難當心境熟近俗修眞誰是居塵不染塵林泉恣興便是修眞無可證恣興林泉且作逍遥陸地仙又安禪聚落難免區區閑把捉聚落安禪佛祖常憂恐落縁山林縱卧無慮無思眞快活縱卧山林一點靈光無物侵贈燕京萬蓮會衆迴頭返照世事無窮堪失笑返照迴頭得意歸來便好休休休省也莫縱貪癡狂野馬省也休休一任年光春復秋懷仁縣懷仁抱義五帝三皇因此治抱義懷仁天下生靈一體親勤參道德建國成家爲法則道德勤參更與修身作指南西路請張道人於處順堂畫西遊記清河畫士處順存心堪發志畫士清河早早來時意若何全眞宗祖畫向白雲傳萬古宗祖全眞永鎮燕山日日新悟南柯勸世着假求仙果迷眞覓佛心香禮拜恐徒尋不斷無明空惹業根深苦口如良藥忠言似美金人逢善者作知音正教依憑萬禍不能侵又生日無明重死時地獄深寸陰可惜勝黄金速悟無生上士做知音轉眼迷他趣迴頭認本心功成自是出陽陰物外眞閑坦蕩賦清吟又莫要欺人重須妨報應深羣眞降世布清吟勸化愚迷灾禍免相侵更悟眞常性勸修吉善心長生路上聽仙音正道無疑穩步赴瑶岑又莫覓他人短唯思自己長處身謙讓性和光與物無私心地得清凉會滅無明火能生智慧香何勞遠去覓天堂任運安閑處處是仙鄉青玉案自遣揚眉瞬目分明露認得元來處清靜無爲香滿炷十方通徹遍聞三界一任年將暮些兒妙處堪人顧關外棲眞忘來去更有雲霞三四侶清吟野興固窮樂道此外非他取又心頭遠惡常修善自得眞方便至道夷然容易見目前端正是非休論堪作長生伴玄言悟徹無分辯默默頤眞内光現保養神丹成九轉化身空外六銖天賜换了如今面又浮華莫戀心歸道漸得通玄妙清靜功圓心地了高登彼岸清凉永占更没閑煩惱長春眞境仙無老咫尺洞天誰能到心上塵情都一掃琳宫仙院乘風清興遊宴蓬萊島又羣魔散盡眞何亂萬事無縈絆一點光同青玉案纖塵不掛永無障礙得見虚空面勸君早把塵情𢬵下手速修轉頭晩前有風波深不淺神舟穩駕雲朋相伴笑指蘆花岸瑞鷓鴣與延眞觀小賈師道人起念不尋常宿業牽纏惹禍殃樸實修眞方得久浮虚學道豈能長旋生旋滅心難定不動不揺意易防早悟知常功累足恁時許爾志堅剛詠西山西山深處道人家養道修眞何處加九夏高眠無暑氣三秋結實有新瓜亂山坡下宜禾黍渾水河邊長麥麻四季平和人事少三飡終日是生涯過龍泉峪西山一帶好人煙曲水環山若洞天無是無非無寵辱有花有果有林泉家家奉道邀閑客户户欽壇禮大仙如此勤心行吉善太平快樂遇豐年示衆論道談禪鬥捷機朦朧合眼便昏迷貪名競利心猶在損己安人行豈知益友不侵賢聖遠良朋難近虎狼隨一朝數滿無由悔聞早收心莫縱欺又爲人幸遇教門興折莫因循著世榮節食减眠神自爽忘情去慾氣偏清暫時戒慎離灾苦久遠行持出死生奉勸高眀宜省悟聞身强健早修行勸世長春教法付清和普勸高明出愛河道德勸修天賜樂塵情苦戀世生魔目前放下遊眞境身後功深赴大羅我有忠言親說破看君聽了意如何又六年動作小功成固蔕深根漸次榮東院西宫閑客坐南來北往道人行十方和氣精神爽四海同心道眼明天運玄風來此地燕山路上好前程南鄉子寶玄堂偶得本性愛疏慵不厭無名不厭窮落魄隨縁無所礙心通觀透人間事事空得失本來同動靜何勞問吉凶兀兀前途眞自得成功都在忘言冷笑中贈西路道人幸遇好良因枉惹浮名受苦辛只爲目前些予事因循趖過中間换了身默坐守靈根空外閑搜空外眞認得亘初微妙物堪親唤作神仙不唤人虞美人勸世邇來似覺精神湧識破人間夢皆因恬淡樂清和與物無私光照遍山河如今普勸修眞衆莫待空無用一朝歸去恨身卑悔不當時勤苦做修持月上海棠示衆先師歸去功無量日赴千壇顯聖象化身千百暗中度人來往休輕謗恐灾禍臨頭怎向一時開化通無上廣集門生普供養但持齋戒志心各懷歸仰虛空裏管有神明賜賞踏雲行贈長春宫道衆智慧男兒聰明上士修眞幸遇先師指葆光殿閣對青山白雲堪伴長春子樂道眀心勝看經史神仙籍上書名字大家勤苦守靈蹤皇天肯負清高志自詠薄利虛名誰人能戒前頭路險猶貪愛惟予不敢着浮華中心有願超三界廣布慈風休生懈怠心懷忍辱常寧耐豁開心地若虚空分明見箇眞難壞又暗地高眞明加保祐白雲仙跡當成就吾門七祖鎮燕山金蓮萬朵芬芳秀衆會寧心道人長久同修清德過星斗他年功滿去朝元先師應賜長生酒又靜裏喧喧鬧中寂寂靈源妙用誰能識兩般顛倒入虚無自然顯箇眞消息氣過三關神遊八極綿綿來往無蹤跡此時休歇罷參尋前程路上忘疑惑讚師父仙體不朽玉骨元清金丹已就長春不老何年朽圓成一性遍河沙遣骸全體仍依舊萬代稀逢一時罕有天涯門弟來奔凑安居處順慶眞容焚香十萬連三書點絳唇重九後五日作體入虚空猶然未可爲憑據眞空路氣神相聚現出陽神去若遇知音此事堪分付君聽取莫生疑悮行滿天將護又聞說修行千差萬别難依據眞空路何人得趣撒手堪歸去行積無邊功要三千數心開悟逍遥雲步應過天仙舉又學道尋眞寧心耐意搜求正刀圭柄羣眞相慶一顆明珠瑩照見元初認得頭和影神通聖内容清興物外閑吟詠又學道難成無明觸處生烟火招殃禍時光虚過生死如何趓早悟前愆更不生人我還眞箇時時明破下手修仙果又燁燁重陽素秋氣爽添清興仙歌詠黄華相稱朵朵如如性小檻芬芳滿座人欽敬眞清靜香風純正萬户千門慶暮春遊五華山繼先師韻昨日春遊一行恰似乘鸞鳳知音共適懷心縱直入桃源洞好向清溪閑聽琴三弄眞歡動任地迎送管甚莊周夢卜筭子玉虚觀夜境中師父令和都要奔波走卜筭子仍易其名日北地樂眞性休空走二物長相守這些消息阿誰知便是無中有寶鼎瓊花放玉户金光透作箇清凉彼岸人清靜工夫就駕聖朝義州醮罷命郭志全講道德二篇古宜縁重善根深種志士心堅感吾門洪教廣開縁共談論功圓中宵不寐雲朋高會參透玄玄向五千文内契忘筌見自己神仙又夜深人靜披衣閑坐琴聽無絃罷高談逸論默通玄任龜息綿綿陰陽昇降沖和四大骨壯神全抱元初一點行功圓看歌舞胎仙太平興國觀中秋賞月海清山靜素秋光滿凉夜人圓恣開懷賞翫過三更更談論幽玄圓明頓悟無私普照善行周全向今宵覺徹性皆通證陸地神仙一剪梅依先師眞人和移刺仲澤韻義州永和庵作九九方終暖日陽春和崇義無夢天長十方三界恣遊行炎夏還逢不覺秋霜悟得眞閑萬事忘自然佚樂心地清凉本來一點縱寬舒散盡羣魔獨現威光示衆復用前韻外積陰功内固陽長春示衆此語偏長還能頓悟入無爲宿業猶如赫日消霜不假澄心六慾忘功成行滿越過炎凉騰騰兀兀任西東覺徹人間且恁韜光太平興國觀示衆天賜平遥好歇心琳宫寂寂古柏森森清陰密鎖洞天幽聚落相鄰靜勝山林清靜無爲孰得尋太平興國覓箇知音勸君速悟莫遲疑言下承當賢聖加臨寄蔚州道友越過靈仙壺水傍西河餞送誠厚難忘未能款話便登程度嶺嚴寒來意匆忙幸得和平達道鄉渾源豐足諸事安康有人東去寄新詞報與知音表我行藏詠前高山新得前高一簇山清虚洞府亘古仙壇皇天憐我苦奔馳佚我年高教我開顔暗謝高穹賜我閑松間石上斷了追攀忻然自得樂無窮行也堪觀坐也堪觀又新得前高自發揚峰巒峭拔松檜成行道人歸計出紅塵碧洞高眠無事牽腸白髮垂垂兩鬢霜青松影裏描邈難粧往來遊戲日當斜行也清凉坐也清凉又新得前高孰可知世間清絶詩筆難題朝元峰上試閑窺未赴蓬萊先到瑶池一派松風入耳吹仙音縹緲洞達幽微興來策杖步雲溪行也相宜坐也相宜述懐贈程老先生學道無成天不慳虚名濫占實得應難從今志氣更重加東望都休不下西山深謝知交忻崞間四時不闕助我衣飡有時慶會上朝元功行雙全日赴千壇述懷贈柳先生一點靈明本寂然隨通隨感應赴諸縁頭頭認得這些兒動也方圓靜也方圓日用無私不着邊清虚消息此法堪傳指人頓悟入無爲行也忘言坐也忘言下山爲愛前高自覺過天生阻隔不放沖和前頭何處道縁深無福清閑有分奔波老也功虧一任魔長春教語慎勿蹉跎自來達道學仙人功也無多行也無多下手遲義州醮罷勸衆諸縁種種怎生休萬慮紛紛何日息情忘處諸縁頓了意滅時萬慮俱畢問君能有幾多時猶向人間弄智識還知恁麽便迴光免使臨頭愁戚戚昭君怨泉州洞直觀書于東壁節令重陽閑步眞至武清南渡極目看嘉祥水茫茫連日陰沉微雨正在蘆花深處遊樂水雲間望西山鳳棲梧觀世大教普聞天下轉返樸全眞日用垂方便方便眞慈清靜願心通漸覺人情遠上士高明容易勸既悟玄風早早忘知見世事安能長久戀不如認證元初面葆光集下
