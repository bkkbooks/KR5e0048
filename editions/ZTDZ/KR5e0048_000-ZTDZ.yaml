front:
  text: 葆光集序同三伏以渾淪未判已合天地之眞清濁將分遂運陰陽之妙由是三才既立萬化俱成品物咸亨異人間出如眞人者姓尹氏世族滄洲人也祖先一母三産九男中内七人各封八縣厥後簪纓熾盛抑今碑銘昭然至眞人愈爲盛事童年入定看乾坤造化之原丱歲出家了性命超昇之訣接人救物考古規今窮萬事之始終列千賢之先後博施廣化汎愛寬容爲而不爭犯而不校欲仁而斯仁至矣不善者亦善覆之蓋由達向背之情曉幽明之故既已往而弗諫但將來者可追知進退存亡恕大小多少流言不入任毁譽以何移凡事飽諳信浮沉而所適隨流若類混迹同塵受垢安身託詞警世清吟編簡意傳萬古以無遺法語敷揚志取一時之有補可以繼全眞而演教叙正派以流芳開衆妙之玄門指三清之直路高縣慧日照破邪陰大振宗風蕩除凶穢故使門庭洒落境界清凉屏幽夜之迷途附長春之勝域擬開靈沼植萬朵之金蓮空駕神舟載一輪之皓月是知人難調制道不加行可懷寶而坐忘或寫憂而遊戲不離方寸歷遍遐荒復挈大千納于毫末心田晃朗照知聞見覺之前性海淵澄湛成住壞空之後感而即應捨之則藏淡泊于無生逍遥于寂滅如如不動冥超劫外之天了了常存永在現前之地般般勘破處處圓成信手拈來轉頭放下諸門遍曉悟萬法以歸心多劫曾修證一眞而合道是以曩離塵世乆處仙鄉優游于碧落之中冥賞于清都之内上方尅約等師父之千年下會來期誕自身于次日是謂至禮無體至讓無辭按美名無稱之稱合上古不德之德其縁有慶其故無私蓋懷弘道之微機以示化人之雅範不虧細行終累大功既足清標敢無美譽浪裁狂語冒讚幽情不防條罪之三千私發師眞之萬一云耳夫葆光集者即眞人之所作也自承教一十三年常坐于大長春宫寶玄堂之重室葆光之軒日有在京士大夫及遠方尊宿參問請益求索唱和或自述懷遣興警誡勸示復因諸方遊歷經臨景物題跋讚詠所得詩詞歌頌編列次第分爲三卷以軒名而立號焉或謂葆者蔽也謂蔽藏靈識不令外馳雖應萬變不失虚寂之體又光者照也謂照破昏闇坦然前進不致陷墜徑入希夷之域又集者聚也謂聚積珠玉衆寶等類施設運用以濟貧苦之者述作之義大略然否或謂詩有四鍊鍊字不如鍊句鍊句不如鍊格鍊格不如鍊意意者志之用詩思之委也故在心爲志發言成詩詩之成也不必字精句健風騷屬時之爲美美者美于德尚于志也志者稟於道感而動之託于辭和而節之成于文文者奮于言言者無罪則思無邪也夫正情性明得失主忠信戒權謀止强梁守柔弱寶慈儉去奢泰崇高節美教化眞人之詩爲深得之如云心中實行真爲寳口内虚詞未足奇又云智源起處姦邪盛禮貌彰時道德衰又云性暴每聞人化虎心慈果見木飛龍又云從他外境魔千遍一片眞心不解驚又云寵辱不驚君子性是非寧動法王身凡此類例篇篇皆然幸覽者知之耳若懈慢而不覽魯莽而不知嗚呼哀哉唯沁州長官杜德康爲當世賢者也一見此集普願衆聞遂募工鏤板以廣其傳庶使英明之士同器之流覽其文而知其實悟其理而得其趣豁然穎脱塵累高蹈眞空名列丹臺永超生滅眞謂仁人之用心也哉峕歲在己亥重九日門弟子煙霞逸人三肅熏沐拜書葆光集上
